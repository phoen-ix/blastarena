  # ===================== Local Co-Op =====================
  /local-coop/login:
    post:
      tags: [Local Co-Op]
      summary: Log in as local co-op player 2
      description: Authenticates P2 and sets an isolated httpOnly cookie. Requires P1 to be authenticated.
      operationId: localCoopLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LocalCoopLoginRequest'
      responses:
        '200':
          description: P2 session created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalCoopSession'
        '400':
          description: Invalid credentials or same user as P1
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/RateLimited'

  /local-coop/session:
    get:
      tags: [Local Co-Op]
      summary: Get current local co-op P2 session
      operationId: localCoopSession
      security: []
      responses:
        '200':
          description: Active P2 session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LocalCoopSession'
        '401':
          description: No session or invalid/expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /local-coop/socket-token:
    get:
      tags: [Local Co-Op]
      summary: Get a short-lived socket token for P2
      description: Converts the P2 httpOnly cookie into a JS-readable token (5min expiry) for socket auth.
      operationId: localCoopSocketToken
      responses:
        '200':
          description: Socket token for P2
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
        '401':
          description: No local co-op session or invalid/expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /local-coop/logout:
    post:
