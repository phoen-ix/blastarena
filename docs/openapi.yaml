      operationId: adminExportAllAchievements
      responses:
        '200':
          description: Achievement bundle JSON file
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AchievementBundleExportData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/achievements/import:
    post:
      tags: [Achievements Admin]
      summary: Import achievements (admin only, two-phase)
      description: |
        Phase 1: Post without `cosmeticIdMap` to detect cosmetic conflicts.
        Phase 2: Post with `cosmeticIdMap` to resolve conflicts and import.
      operationId: adminImportAchievements
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [achievements]
              properties:
                achievements:
                  type: array
                  items:
                    $ref: '#/components/schemas/AchievementExportEntry'
                  description: Achievement data to import
                cosmetics:
                  type: array
                  items:
                    $ref: '#/components/schemas/CosmeticBundleEntry'
                  description: Referenced cosmetics from bundle export
                cosmeticIdMap:
                  type: object
                  additionalProperties:
                    oneOf:
                      - type: integer
                      - type: string
                        enum: [create, skip]
                  description: "Mapping of original cosmetic ID to action: existing ID (number), 'create', or 'skip'"
      responses:
        '200':
          description: Phase 1 response with conflicts, or import result
          content:
            application/json:
              schema:
                oneOf:
                  - type: object
                    properties:
                      conflicts:
                        type: array
                        items:
                          $ref: '#/components/schemas/AchievementImportConflict'
                  - type: object
                    properties:
                      message:
                        type: string
                      created:
                        type: integer
        '400':
          description: Invalid import data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

