components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token passed in Authorization header
    CookieAuth:
      type: apiKey
      in: cookie
      name: refreshToken
      description: httpOnly refresh token cookie (set by login/refresh endpoints)

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Success:
      description: Operation successful
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true

  schemas:
    # ---- Common ----
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    ErrorWithMessage:
      type: object
      properties:
        status:
          type: string
        message:
          type: string

    Message:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ---- Enums ----
    UserRole:
      type: string
      enum: [user, moderator, admin]

    GameMode:
      type: string
      enum: [ffa, teams, battle_royale, sudden_death, deathmatch, king_of_the_hill]

    PowerUpType:
      type: string
      enum: [bomb_up, fire_up, speed_up, shield, kick, pierce_bomb, remote_bomb, line_bomb]

    BotDifficulty:
      type: string
      enum: [easy, normal, hard]

    # ---- Auth ----
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
        accessToken:
          type: string
        expiresIn:
          type: integer
          description: Token expiry in seconds

    PublicUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    # ---- User ----
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        role:
          $ref: '#/components/schemas/UserRole'
        lastLogin:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        totalMatches:
          type: integer
        totalWins:
          type: integer
        totalKills:
          type: integer
        totalDeaths:
          type: integer

    # ---- Lobby ----
    RoomListItem:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        host:
          type: string
        playerCount:
          type: integer
        maxPlayers:
          type: integer
        gameMode:
          $ref: '#/components/schemas/GameMode'
        status:
          type: string
          enum: [waiting, playing]

    MatchConfig:
      type: object
      properties:
        gameMode:
          $ref: '#/components/schemas/GameMode'
        maxPlayers:
          type: integer
          minimum: 2
          maximum: 8
        mapWidth:
          type: integer
        mapHeight:
          type: integer
        mapSeed:
          type: integer
        roundTime:
          type: integer
        teams:
          type: integer
        wallDensity:
          type: number
        enabledPowerUps:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpType'
        powerUpDropRate:
          type: number
        botCount:
          type: integer
        botDifficulty:
          $ref: '#/components/schemas/BotDifficulty'
        botTeams:
          type: array
          items:
            type: integer
            nullable: true
        friendlyFire:
          type: boolean
        hazardTiles:
          type: boolean
        enableMapEvents:
          type: boolean
        reinforcedWalls:
          type: boolean
        recordGame:
          type: boolean
        botAiId:
          type: string

    # ---- Campaign ----
    CampaignWorld:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer
        theme:
          type: string
        isPublished:
          type: boolean
        levelCount:
          type: integer
        completedCount:
          type: integer

    CampaignWorldWithLevels:
      allOf:
        - $ref: '#/components/schemas/CampaignWorld'
        - type: object
          properties:
            levels:
              type: array
              items:
                $ref: '#/components/schemas/CampaignLevelSummary'

    CampaignLevelSummary:
      type: object
      properties:
        id:
          type: integer
        worldId:
          type: integer
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer
        mapWidth:
          type: integer
        mapHeight:
          type: integer
        winCondition:
          $ref: '#/components/schemas/CampaignWinCondition'
        lives:
          type: integer
        timeLimit:
          type: integer
        parTime:
          type: integer
        enemyCount:
          type: integer
        isPublished:
          type: boolean
        progress:
          $ref: '#/components/schemas/LevelProgress'

    CampaignLevel:
      type: object
      properties:
        id:
          type: integer
        worldId:
          type: integer
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer
        mapWidth:
          type: integer
        mapHeight:
          type: integer
        tiles:
          type: array
          items:
            type: array
            items:
              type: string
        fillMode:
          type: string
          enum: [handcrafted, hybrid]
        wallDensity:
          type: number
        playerSpawns:
          type: array
          items:
            $ref: '#/components/schemas/Position'
        enemyPlacements:
          type: array
          items:
            $ref: '#/components/schemas/EnemyPlacement'
        powerupPlacements:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpPlacement'
        winCondition:
          $ref: '#/components/schemas/CampaignWinCondition'
        winConditionConfig:
          type: object
          nullable: true
        lives:
          type: integer
        timeLimit:
          type: integer
        parTime:
          type: integer
        carryOverPowerups:
          type: boolean
        startingPowerups:
          type: object
          nullable: true
        availablePowerupTypes:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpType'
          nullable: true
        powerupDropRate:
          type: number
        reinforcedWalls:
          type: boolean
        hazardTiles:
          type: boolean
        coveredTiles:
          type: array
          items:
            type: object
            properties:
              x:
                type: integer
              y:
                type: integer
              type:
                type: string
        isPublished:
          type: boolean

    CampaignWinCondition:
      type: string
      enum: [kill_all, find_exit, reach_goal, survive_time]

    LevelProgress:
      type: object
      properties:
        levelId:
          type: integer
        completed:
          type: boolean
        bestTimeSeconds:
          type: number
          nullable: true
        stars:
          type: integer
        attempts:
          type: integer

    CampaignUserState:
      type: object
      properties:
        currentWorldId:
          type: integer
          nullable: true
        currentLevelId:
          type: integer
          nullable: true
        carriedPowerups:
          type: object
          nullable: true
        totalLevelsCompleted:
          type: integer
        totalStars:
          type: integer

    Position:
      type: object
      required: [x, y]
      properties:
        x:
          type: integer
        y:
          type: integer

    EnemyPlacement:
      type: object
      required: [enemyTypeId, x, y]
      properties:
        enemyTypeId:
          type: integer
        x:
          type: integer
        y:
          type: integer
        patrolPath:
          type: array
          items:
            $ref: '#/components/schemas/Position'

    PowerUpPlacement:
      type: object
      required: [type, x, y, hidden]
      properties:
        type:
          $ref: '#/components/schemas/PowerUpType'
        x:
          type: integer
        y:
          type: integer
        hidden:
          type: boolean

    EnemyTypeEntry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        config:
          $ref: '#/components/schemas/EnemyTypeConfig'
        isBoss:
          type: boolean
        createdAt:
          type: string
          format: date-time

    EnemyTypeConfig:
      type: object
      properties:
        speed:
          type: number
          minimum: 0.1
          maximum: 5
        movementPattern:
          type: string
          enum: [random_walk, chase_player, patrol_path, wall_follow, stationary]
        canPassWalls:
          type: boolean
        canPassBombs:
          type: boolean
        canBomb:
          type: boolean
        bombConfig:
          $ref: '#/components/schemas/EnemyBombConfig'
        hp:
          type: integer
          minimum: 1
          maximum: 100
        contactDamage:
          type: boolean
        sprite:
          $ref: '#/components/schemas/EnemySpriteConfig'
        dropChance:
          type: number
          minimum: 0
          maximum: 1
        dropTable:
          type: array
          items:
            type: string
        isBoss:
          type: boolean
        sizeMultiplier:
          type: number
          minimum: 1
          maximum: 3
        bossPhases:
          type: array
          items:
            $ref: '#/components/schemas/BossPhaseConfig'

    EnemyBombConfig:
      type: object
      properties:
        fireRange:
          type: integer
          minimum: 1
          maximum: 8
        cooldownTicks:
          type: integer
          minimum: 10
          maximum: 200
        trigger:
          type: string
          enum: [timer, proximity, random]
        proximityRange:
          type: integer
          minimum: 1
          maximum: 20

    EnemySpriteConfig:
      type: object
      properties:
        bodyShape:
          type: string
          enum: [blob, spiky, ghost, robot, bug, skull]
        primaryColor:
          type: string
        secondaryColor:
          type: string
        eyeStyle:
          type: string
          enum: [round, angry, sleepy, crazy]
        hasTeeth:
          type: boolean
        hasHorns:
          type: boolean
        hasTail:
          type: boolean
        hasAura:
          type: boolean
        hasCrown:
          type: boolean
        hasScar:
          type: boolean
        hasWings:
          type: boolean
        accessory:
          type: string
          enum: [none, bow_tie, monocle, bandana]

    BossPhaseConfig:
      type: object
      required: [hpThreshold]
      properties:
        hpThreshold:
          type: number
          minimum: 0
          maximum: 1
        speedMultiplier:
          type: number
        movementPattern:
          type: string
          enum: [random_walk, chase_player, patrol_path, wall_follow, stationary]
        canBomb:
          type: boolean
        bombConfig:
          $ref: '#/components/schemas/EnemyBombConfig'
        spawnEnemies:
          type: array
          items:
            type: object
            properties:
              enemyTypeId:
                type: integer
              count:
                type: integer
                minimum: 1
                maximum: 10

    EnemyTypeInput:
      type: object
      required: [name, config]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 2000
        config:
          $ref: '#/components/schemas/EnemyTypeConfig'

    LevelInput:
      type: object
      properties:
        worldId:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 2000
        mapWidth:
          type: integer
          minimum: 7
          maximum: 51
        mapHeight:
          type: integer
          minimum: 7
          maximum: 51
        tiles:
          type: array
          items:
            type: array
            items:
              type: string
        fillMode:
          type: string
          enum: [handcrafted, hybrid]
        wallDensity:
          type: number
          minimum: 0.1
          maximum: 0.9
        playerSpawns:
          type: array
          items:
            $ref: '#/components/schemas/Position'
        enemyPlacements:
          type: array
          items:
            $ref: '#/components/schemas/EnemyPlacement'
        powerupPlacements:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpPlacement'
        winCondition:
          $ref: '#/components/schemas/CampaignWinCondition'
        winConditionConfig:
          type: object
        lives:
          type: integer
          minimum: 1
          maximum: 99
        timeLimit:
          type: integer
