      security: []
      operationId: getActiveAIs
      responses:
        '200':
          description: Active AI list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ais:
                    type: array
                    items:
                      $ref: '#/components/schemas/BotAIEntry'

  /admin/ai:
    get:
      tags: [Bot AI]
      summary: List all bot AIs (admin only)
      operationId: adminListAIs
      responses:
        '200':
          description: All AIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  ais:
                    type: array
                    items:
                      $ref: '#/components/schemas/BotAIEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Bot AI]
      summary: Upload a new bot AI (admin only)
      operationId: adminUploadAI
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, name]
              properties:
                file:
                  type: string
                  format: binary
                  description: TypeScript source file (.ts, max 500KB)
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
      responses:
        '201':
          description: AI uploaded and compiled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ai:
                    $ref: '#/components/schemas/BotAIEntry'
        '400':
          description: Compilation/validation failed or no file
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/ai/{id}:
    put:
      tags: [Bot AI]
      summary: Update bot AI metadata (admin only)
      operationId: adminUpdateAI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
                isActive:
                  type: boolean
      responses:
        '200':
          description: AI updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Bot AI]
      summary: Delete a bot AI (admin only)
      operationId: adminDeleteAI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: AI deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

