openapi: 3.0.3
info:
  title: BlastArena API
  version: 1.0.0
  description: |
    REST API for BlastArena, a multiplayer online grid-based explosive arena game.
    All endpoints are mounted under the `/api` prefix.
    Authentication uses JWT Bearer tokens (access token) and httpOnly cookies (refresh token).

servers:
  - url: /api
    description: API base path

tags:
  - name: Health
    description: Service health check
  - name: Auth
    description: Authentication (register, login, logout, token refresh, email verification, password reset)
  - name: User
    description: User profile and account management
  - name: Lobby
    description: Game room listing and creation
  - name: Campaign
    description: Player-facing campaign endpoints (worlds, levels, progress, enemy types)
  - name: Campaign Admin
    description: Admin campaign management (worlds, levels, enemy types, import/export)
  - name: Settings
    description: Application settings (public reads, admin writes)
  - name: Users Admin
    description: Admin user management
  - name: Matches
    description: Match history and management
  - name: Rooms
    description: Active room listing (admin/staff)
  - name: Audit Log
    description: Admin action audit log
  - name: Announcements
    description: Toast and banner announcements
  - name: Replays
    description: Game replay management
  - name: Simulations
    description: Bot simulation batch management
  - name: Bot AI
    description: Custom bot AI upload and management
  - name: Local Co-Op
    description: Local co-op player 2 session management
  - name: Leaderboard
    description: Public leaderboard, ranks, seasons, and player profiles
  - name: Friends
    description: Friend list, blocked users, and user search
  - name: Messages
    description: Direct message conversations
  - name: Cosmetics
    description: Player cosmetics and equipment
  - name: Achievements
    description: Achievement definitions and player progress
  - name: Custom Maps
    description: User-created map management
  - name: Docs
    description: Documentation file serving
  - name: Campaign Replays
    description: Campaign replay management (staff/admin)
  - name: Enemy AI
    description: Admin enemy AI management
  - name: Seasons
    description: Admin season management
  - name: Achievements Admin
    description: Admin achievement management and import/export
  - name: Cosmetics Admin
    description: Admin cosmetic management and import/export

security:
  - BearerAuth: []

paths:
  # ===================== Health =====================
  /health:
    get:
      tags: [Health]
      summary: Health check
      security: []
      operationId: getHealth
      responses:
        '200':
          description: Service healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  buildId:
                    type: string
                  timestamp:
                    type: string
                    format: date-time
        '503':
          description: Service unavailable
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorWithMessage'

  # ===================== Auth =====================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register a new user
      security: []
      operationId: register
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/ValidationError'
        '403':
          description: Registration disabled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '409':
          description: Username or email already taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/login:
    post:
      tags: [Auth]
      summary: Log in with credentials
      description: Returns access token in body and sets httpOnly refreshToken cookie.
      security: []
      operationId: login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login successful
          headers:
            Set-Cookie:
              description: httpOnly refreshToken cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/logout:
    post:
      tags: [Auth]
      summary: Log out (revoke refresh token)
      operationId: logout
      responses:
        '200':
          description: Logged out
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token using cookie
      description: Uses the httpOnly refreshToken cookie. No Authorization header needed.
      security:
        - CookieAuth: []
      operationId: refreshToken
      responses:
        '200':
          description: Token refreshed
          headers:
            Set-Cookie:
              description: Updated httpOnly refreshToken cookie
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponse'
        '401':
          description: No refresh token or token invalid
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/verify-email/{token}:
    get:
      tags: [Auth]
      summary: Verify email address
      security: []
      operationId: verifyEmail
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/forgot-password:
    post:
      tags: [Auth]
      summary: Request password reset email
      security: []
      operationId: forgotPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        '200':
          description: Reset email sent (if account exists)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '429':
          $ref: '#/components/responses/RateLimited'

  /auth/reset-password:
    post:
      tags: [Auth]
      summary: Reset password with token
      security: []
      operationId: resetPassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, password]
              properties:
                token:
                  type: string
                password:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        '200':
          description: Password reset
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid token or password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '429':
          $ref: '#/components/responses/RateLimited'

  # ===================== User =====================
  /user/profile:
    get:
      tags: [User]
      summary: Get current user profile
      operationId: getUserProfile
      responses:
        '200':
          description: User profile with stats
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [User]
      summary: Update user profile
      operationId: updateUserProfile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                username:
                  type: string
                  minLength: 3
                  maxLength: 20
      responses:
        '200':
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/UserProfile'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '409':
          description: Username taken
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /user/email:
    post:
      tags: [User]
      summary: Change email address
      description: Admins get direct update; regular users receive a confirmation email.
      operationId: changeEmail
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
                  maxLength: 255
      responses:
        '200':
          description: Email updated or confirmation sent
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
    delete:
      tags: [User]
      summary: Cancel pending email change
      operationId: cancelEmailChange
      responses:
        '200':
          description: Pending change cancelled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/password:
    post:
      tags: [User]
      summary: Change password
      operationId: changePassword
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [currentPassword, newPassword]
              properties:
                currentPassword:
                  type: string
                  maxLength: 128
                newPassword:
                  type: string
                  minLength: 8
                  maxLength: 128
      responses:
        '200':
          description: Password changed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Validation error or same password
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /user/confirm-email/{token}:
    get:
      tags: [User]
      summary: Confirm email change
      security: []
      operationId: confirmEmailChange
      parameters:
        - name: token
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ===================== Lobby =====================
  /lobby/rooms:
    get:
      tags: [Lobby]
      summary: List active rooms
      operationId: listRooms
      responses:
        '200':
          description: Array of room list items
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/RoomListItem'
        '401':
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [Lobby]
      summary: Create a new room
      operationId: createRoom
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name, config]
              properties:
                name:
                  type: string
                  minLength: 3
                  maxLength: 30
                config:
                  type: object
                  required: [gameMode, maxPlayers]
                  properties:
                    gameMode:
                      $ref: '#/components/schemas/GameMode'
                    maxPlayers:
                      type: integer
                      minimum: 2
                      maximum: 8
                    mapWidth:
                      type: integer
                      minimum: 11
                      maximum: 21
                      default: 15
                    mapHeight:
                      type: integer
                      minimum: 9
                      maximum: 17
                      default: 13
                    mapSeed:
                      type: integer
                    roundTime:
                      type: integer
                      minimum: 60
                      maximum: 600
                      default: 180
      responses:
        '201':
          description: Room created
          content:
            application/json:
              schema:
                type: object
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ===================== Campaign (Player) =====================
  /campaign/worlds:
    get:
      tags: [Campaign]
      summary: List published worlds with progress
      operationId: getCampaignWorlds
      responses:
        '200':
          description: Worlds with nested levels and user progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  worlds:
                    type: array
                    items:
                      $ref: '#/components/schemas/CampaignWorldWithLevels'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /campaign/worlds/{worldId}/levels:
    get:
      tags: [Campaign]
      summary: List published levels in a world
      operationId: getCampaignWorldLevels
      parameters:
        - name: worldId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Levels in world
          content:
            application/json:
              schema:
                type: object
                properties:
                  levels:
                    type: array
                    items:
                      $ref: '#/components/schemas/CampaignLevelSummary'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /campaign/levels/{levelId}:
    get:
      tags: [Campaign]
      summary: Get full level data
      description: Returns published levels only.
      operationId: getCampaignLevel
      parameters:
        - name: levelId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Full level data
          content:
            application/json:
              schema:
                type: object
                properties:
                  level:
                    $ref: '#/components/schemas/CampaignLevel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Level not found or not published
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /campaign/progress:
    get:
      tags: [Campaign]
      summary: Get user campaign state
      operationId: getCampaignProgress
      responses:
        '200':
          description: User campaign progress
          content:
            application/json:
              schema:
                type: object
                properties:
                  state:
                    $ref: '#/components/schemas/CampaignUserState'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /campaign/enemy-types:
    get:
      tags: [Campaign]
      summary: List all enemy types
      operationId: getCampaignEnemyTypes
      responses:
        '200':
          description: All enemy types
          content:
            application/json:
              schema:
                type: object
                properties:
                  enemyTypes:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnemyTypeEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ===================== Campaign Admin =====================
  /admin/campaign/worlds:
    get:
      tags: [Campaign Admin]
      summary: List all worlds (including unpublished)
      operationId: adminListWorlds
      responses:
        '200':
          description: All worlds
          content:
            application/json:
              schema:
                type: object
                properties:
                  worlds:
                    type: array
                    items:
                      $ref: '#/components/schemas/CampaignWorld'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Campaign Admin]
      summary: Create a world
      operationId: adminCreateWorld
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [name]
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 2000
                theme:
                  type: string
                  minLength: 1
                  maxLength: 50
                  default: classic
      responses:
        '201':
          description: World created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/campaign/worlds/{id}:
    put:
      tags: [Campaign Admin]
      summary: Update a world
      operationId: adminUpdateWorld
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 2000
                theme:
                  type: string
                  minLength: 1
                  maxLength: 50
                isPublished:
                  type: boolean
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Campaign Admin]
      summary: Delete a world
      operationId: adminDeleteWorld
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/campaign/worlds/{id}/order:
    put:
      tags: [Campaign Admin]
      summary: Reorder a world
      operationId: adminReorderWorld
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SortOrderRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/campaign/levels:
    get:
      tags: [Campaign Admin]
      summary: List levels in a world
      operationId: adminListLevels
      parameters:
        - name: worldId
          in: query
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Levels
          content:
            application/json:
              schema:
                type: object
                properties:
                  levels:
                    type: array
                    items:
                      $ref: '#/components/schemas/CampaignLevel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Campaign Admin]
      summary: Create a level
      operationId: adminCreateLevel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LevelInput'
      responses:
        '201':
          description: Level created
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/campaign/levels/{id}:
    get:
      tags: [Campaign Admin]
      summary: Get level detail
      operationId: adminGetLevel
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Level detail
          content:
            application/json:
              schema:
                type: object
                properties:
                  level:
                    $ref: '#/components/schemas/CampaignLevel'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Level not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
    put:
      tags: [Campaign Admin]
      summary: Update a level
      operationId: adminUpdateLevel
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LevelInput'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '400':
          $ref: '#/components/responses/ValidationError'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Campaign Admin]
      summary: Delete a level
      operationId: adminDeleteLevel
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/campaign/levels/{id}/order:
    put:
      tags: [Campaign Admin]
      summary: Reorder a level
      operationId: adminReorderLevel
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SortOrderRequest'
      responses:
        '200':
          $ref: '#/components/responses/Success'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/campaign/levels/{id}/export:
    get:
      tags: [Campaign Admin]
      summary: Export level as JSON
      operationId: adminExportLevel
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: JSON file download
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LevelExportData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Level not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/campaign/levels/{id}/export-bundle:
    get:
      tags: [Campaign Admin]
      summary: Export level bundle (level + enemy types)
      operationId: adminExportLevelBundle
      parameters:
        - $ref: '#/components/parameters/ResourceId'
      responses:
        '200':
          description: Bundle JSON file download
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LevelBundleExportData'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: Level not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /admin/campaign/levels/import:
    post:
      tags: [Campaign Admin]
      summary: Import a level (two-phase with conflict resolution)
      description: |
        Phase 1: Post without `enemyIdMap` to get a `conflicts` array for unresolved enemy type IDs.
        Phase 2: Post with `enemyIdMap` to resolve conflicts (create/use-existing/skip) and create the level.
      operationId: adminImportLevel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [level, worldId]
              properties:
                level:
                  type: object
                  description: Level export data or raw level data
                enemyTypes:
                  type: array
                  items:
                    type: object
                  description: Bundled enemy types (from bundle export)
                worldId:
                  type: integer
                enemyIdMap:
                  type: object
                  additionalProperties:
                    oneOf:
                      - type: integer
                      - type: string
                        enum: [create, skip]
                  description: "Mapping of original enemy type ID to action: existing ID (number), 'create', or 'skip'"
      responses:
        '200':
          description: Phase 1 response with conflicts
          content:
            application/json:
              schema:
                type: object
                properties:
                  conflicts:
                    type: array
                    items:
                      $ref: '#/components/schemas/ImportConflict'
        '201':
          description: Level imported successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  id:
                    type: integer
        '400':
          description: Invalid level data
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/campaign/enemy-types:
    get:
      tags: [Campaign Admin]
      summary: List all enemy types (admin)
      operationId: adminListEnemyTypes
      responses:
        '200':
          description: All enemy types
          content:
            application/json:
              schema:
                type: object
                properties:
                  enemyTypes:
                    type: array
                    items:
                      $ref: '#/components/schemas/EnemyTypeEntry'
        '401':
