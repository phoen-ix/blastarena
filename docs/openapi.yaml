      summary: List active bot AIs (public)
      security: []
      operationId: getActiveAIs
      responses:
        '200':
          description: Active AI list
          content:
            application/json:
              schema:
                type: object
                properties:
                  ais:
                    type: array
                    items:
                      $ref: '#/components/schemas/BotAIEntry'

  /admin/ai:
    get:
      tags: [Bot AI]
      summary: List all bot AIs (admin only)
      operationId: adminListAIs
      responses:
        '200':
          description: All AIs
          content:
            application/json:
              schema:
                type: object
                properties:
                  ais:
                    type: array
                    items:
                      $ref: '#/components/schemas/BotAIEntry'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    post:
      tags: [Bot AI]
      summary: Upload a new bot AI (admin only)
      operationId: adminUploadAI
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file, name]
              properties:
                file:
                  type: string
                  format: binary
                  description: TypeScript source file (.ts, max 500KB)
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
      responses:
        '201':
          description: AI uploaded and compiled
          content:
            application/json:
              schema:
                type: object
                properties:
                  ai:
                    $ref: '#/components/schemas/BotAIEntry'
        '400':
          description: Compilation/validation failed or no file
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/ai/{id}:
    put:
      tags: [Bot AI]
      summary: Update bot AI metadata (admin only)
      operationId: adminUpdateAI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                  minLength: 1
                  maxLength: 100
                description:
                  type: string
                  maxLength: 500
                isActive:
                  type: boolean
      responses:
        '200':
          description: AI updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
    delete:
      tags: [Bot AI]
      summary: Delete a bot AI (admin only)
      operationId: adminDeleteAI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: AI deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/ai/{id}/upload:
    put:
      tags: [Bot AI]
      summary: Re-upload bot AI source (admin only)
      operationId: adminReuploadAI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: TypeScript source file (.ts, max 500KB)
      responses:
        '200':
          description: AI source updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Message'
        '400':
          description: Compilation/validation failed or no file
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
                  errors:
                    type: array
                    items:
                      type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /admin/ai/{id}/download:
    get:
      tags: [Bot AI]
      summary: Download bot AI source (admin only)
      operationId: adminDownloadAI
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: TypeScript source file
          content:
            text/typescript:
              schema:
                type: string
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          description: AI source not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token passed in Authorization header
    CookieAuth:
      type: apiKey
      in: cookie
      name: refreshToken
      description: httpOnly refresh token cookie (set by login/refresh endpoints)

  parameters:
    ResourceId:
      name: id
      in: path
      required: true
      schema:
        type: integer
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    Limit:
      name: limit
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20

  responses:
    Unauthorized:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Forbidden:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
    Success:
      description: Operation successful
      content:
        application/json:
          schema:
            type: object
            properties:
              success:
                type: boolean
                example: true

  schemas:
    # ---- Common ----
    Error:
      type: object
      properties:
        error:
          type: string
      required: [error]

    ErrorWithMessage:
      type: object
      properties:
        status:
          type: string
        message:
          type: string

    Message:
      type: object
      properties:
        message:
          type: string
      required: [message]

    # ---- Enums ----
    UserRole:
      type: string
      enum: [user, moderator, admin]

    GameMode:
      type: string
      enum: [ffa, teams, battle_royale, sudden_death, deathmatch, king_of_the_hill]

    PowerUpType:
      type: string
      enum: [bomb_up, fire_up, speed_up, shield, kick, pierce_bomb, remote_bomb, line_bomb]

    BotDifficulty:
      type: string
      enum: [easy, normal, hard]

    # ---- Auth ----
    RegisterRequest:
      type: object
      required: [username, email, password]
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 20
        email:
          type: string
          format: email
          maxLength: 255
        password:
          type: string
          minLength: 8
          maxLength: 128

    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string

    AuthResponse:
      type: object
      properties:
        user:
          $ref: '#/components/schemas/PublicUser'
        accessToken:
          type: string
        expiresIn:
          type: integer
          description: Token expiry in seconds

    PublicUser:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'

    # ---- User ----
    UserProfile:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        emailVerified:
          type: boolean
        role:
          $ref: '#/components/schemas/UserRole'
        lastLogin:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        totalMatches:
          type: integer
        totalWins:
          type: integer
        totalKills:
          type: integer
        totalDeaths:
          type: integer

    # ---- Lobby ----
    RoomListItem:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        host:
          type: string
        playerCount:
          type: integer
        maxPlayers:
          type: integer
        gameMode:
          $ref: '#/components/schemas/GameMode'
        status:
          type: string
          enum: [waiting, playing]

    MatchConfig:
      type: object
      properties:
        gameMode:
          $ref: '#/components/schemas/GameMode'
        maxPlayers:
          type: integer
          minimum: 2
          maximum: 8
        mapWidth:
          type: integer
        mapHeight:
          type: integer
        mapSeed:
          type: integer
        roundTime:
          type: integer
        teams:
          type: integer
        wallDensity:
          type: number
        enabledPowerUps:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpType'
        powerUpDropRate:
          type: number
        botCount:
          type: integer
        botDifficulty:
          $ref: '#/components/schemas/BotDifficulty'
        botTeams:
          type: array
          items:
            type: integer
            nullable: true
        friendlyFire:
          type: boolean
        hazardTiles:
          type: boolean
        enableMapEvents:
          type: boolean
        reinforcedWalls:
          type: boolean
        recordGame:
          type: boolean
        botAiId:
          type: string

    # ---- Campaign ----
    CampaignWorld:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer
        theme:
          type: string
        isPublished:
          type: boolean
        levelCount:
          type: integer
        completedCount:
          type: integer

    CampaignWorldWithLevels:
      allOf:
        - $ref: '#/components/schemas/CampaignWorld'
        - type: object
          properties:
            levels:
              type: array
              items:
                $ref: '#/components/schemas/CampaignLevelSummary'

    CampaignLevelSummary:
      type: object
      properties:
        id:
          type: integer
        worldId:
          type: integer
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer
        mapWidth:
          type: integer
        mapHeight:
          type: integer
        winCondition:
          $ref: '#/components/schemas/CampaignWinCondition'
        lives:
          type: integer
        timeLimit:
          type: integer
        parTime:
          type: integer
        enemyCount:
          type: integer
        isPublished:
          type: boolean
        progress:
          $ref: '#/components/schemas/LevelProgress'

    CampaignLevel:
      type: object
      properties:
        id:
          type: integer
        worldId:
          type: integer
        name:
          type: string
        description:
          type: string
        sortOrder:
          type: integer
        mapWidth:
          type: integer
        mapHeight:
          type: integer
        tiles:
          type: array
          items:
            type: array
            items:
              type: string
        fillMode:
          type: string
          enum: [handcrafted, hybrid]
        wallDensity:
          type: number
        playerSpawns:
          type: array
          items:
            $ref: '#/components/schemas/Position'
        enemyPlacements:
          type: array
          items:
            $ref: '#/components/schemas/EnemyPlacement'
        powerupPlacements:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpPlacement'
        winCondition:
          $ref: '#/components/schemas/CampaignWinCondition'
        winConditionConfig:
          type: object
          nullable: true
        lives:
          type: integer
        timeLimit:
          type: integer
        parTime:
          type: integer
        carryOverPowerups:
          type: boolean
        startingPowerups:
          type: object
          nullable: true
        availablePowerupTypes:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpType'
          nullable: true
        powerupDropRate:
          type: number
        reinforcedWalls:
          type: boolean
        hazardTiles:
          type: boolean
        coveredTiles:
          type: array
          items:
            type: object
            properties:
              x:
                type: integer
              y:
                type: integer
              type:
                type: string
        isPublished:
          type: boolean

    CampaignWinCondition:
      type: string
      enum: [kill_all, find_exit, reach_goal, survive_time]

    LevelProgress:
      type: object
      properties:
        levelId:
          type: integer
        completed:
          type: boolean
        bestTimeSeconds:
          type: number
          nullable: true
        stars:
          type: integer
        attempts:
          type: integer

    CampaignUserState:
      type: object
      properties:
        currentWorldId:
          type: integer
          nullable: true
        currentLevelId:
          type: integer
          nullable: true
        carriedPowerups:
          type: object
          nullable: true
        totalLevelsCompleted:
          type: integer
        totalStars:
          type: integer

    Position:
      type: object
      required: [x, y]
      properties:
        x:
          type: integer
        y:
          type: integer

    EnemyPlacement:
      type: object
      required: [enemyTypeId, x, y]
      properties:
        enemyTypeId:
          type: integer
        x:
          type: integer
        y:
          type: integer
        patrolPath:
          type: array
          items:
            $ref: '#/components/schemas/Position'

    PowerUpPlacement:
      type: object
      required: [type, x, y, hidden]
      properties:
        type:
          $ref: '#/components/schemas/PowerUpType'
        x:
          type: integer
        y:
          type: integer
        hidden:
          type: boolean

    EnemyTypeEntry:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: string
        config:
          $ref: '#/components/schemas/EnemyTypeConfig'
        isBoss:
          type: boolean
        createdAt:
          type: string
          format: date-time

    EnemyTypeConfig:
      type: object
      properties:
        speed:
          type: number
          minimum: 0.1
          maximum: 5
        movementPattern:
          type: string
          enum: [random_walk, chase_player, patrol_path, wall_follow, stationary]
        canPassWalls:
          type: boolean
        canPassBombs:
          type: boolean
        canBomb:
          type: boolean
        bombConfig:
          $ref: '#/components/schemas/EnemyBombConfig'
        hp:
          type: integer
          minimum: 1
          maximum: 100
        contactDamage:
          type: boolean
        sprite:
          $ref: '#/components/schemas/EnemySpriteConfig'
        dropChance:
          type: number
          minimum: 0
          maximum: 1
        dropTable:
          type: array
          items:
            type: string
        isBoss:
          type: boolean
        sizeMultiplier:
          type: number
          minimum: 1
          maximum: 3
        bossPhases:
          type: array
          items:
            $ref: '#/components/schemas/BossPhaseConfig'

    EnemyBombConfig:
      type: object
      properties:
        fireRange:
          type: integer
          minimum: 1
          maximum: 8
        cooldownTicks:
          type: integer
          minimum: 10
          maximum: 200
        trigger:
          type: string
          enum: [timer, proximity, random]
        proximityRange:
          type: integer
          minimum: 1
          maximum: 20

    EnemySpriteConfig:
      type: object
      properties:
        bodyShape:
          type: string
          enum: [blob, spiky, ghost, robot, bug, skull]
        primaryColor:
          type: string
        secondaryColor:
          type: string
        eyeStyle:
          type: string
          enum: [round, angry, sleepy, crazy]
        hasTeeth:
          type: boolean
        hasHorns:
          type: boolean

    BossPhaseConfig:
      type: object
      required: [hpThreshold]
      properties:
        hpThreshold:
          type: number
          minimum: 0
          maximum: 1
        speedMultiplier:
          type: number
        movementPattern:
          type: string
          enum: [random_walk, chase_player, patrol_path, wall_follow, stationary]
        canBomb:
          type: boolean
        bombConfig:
          $ref: '#/components/schemas/EnemyBombConfig'
        spawnEnemies:
          type: array
          items:
            type: object
            properties:
              enemyTypeId:
                type: integer
              count:
                type: integer
                minimum: 1
                maximum: 10

    EnemyTypeInput:
      type: object
      required: [name, config]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 2000
        config:
          $ref: '#/components/schemas/EnemyTypeConfig'

    LevelInput:
      type: object
      properties:
        worldId:
          type: integer
        name:
          type: string
          minLength: 1
          maxLength: 100
        description:
          type: string
          maxLength: 2000
        mapWidth:
          type: integer
          minimum: 7
          maximum: 51
        mapHeight:
          type: integer
          minimum: 7
          maximum: 51
        tiles:
          type: array
          items:
            type: array
            items:
              type: string
        fillMode:
          type: string
          enum: [handcrafted, hybrid]
        wallDensity:
          type: number
          minimum: 0.1
          maximum: 0.9
        playerSpawns:
          type: array
          items:
            $ref: '#/components/schemas/Position'
        enemyPlacements:
          type: array
          items:
            $ref: '#/components/schemas/EnemyPlacement'
        powerupPlacements:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpPlacement'
        winCondition:
          $ref: '#/components/schemas/CampaignWinCondition'
        winConditionConfig:
          type: object
        lives:
          type: integer
          minimum: 1
          maximum: 99
        timeLimit:
          type: integer
          minimum: 0
          maximum: 3600
        parTime:
          type: integer
          minimum: 0
          maximum: 3600
        carryOverPowerups:
          type: boolean
        startingPowerups:
          type: object
        availablePowerupTypes:
          type: array
          items:
            type: string
        powerupDropRate:
          type: number
          minimum: 0
          maximum: 1
        reinforcedWalls:
          type: boolean
        hazardTiles:
          type: boolean
        coveredTiles:
          type: array
          items:
            type: object
            properties:
              x:
                type: integer
              y:
                type: integer
              type:
                type: string
        isPublished:
          type: boolean

    LevelExportData:
      type: object
      properties:
        _format:
          type: string
          enum: [blast-arena-level]
        _version:
          type: integer
          enum: [1]
        name:
          type: string
        description:
          type: string
        mapWidth:
          type: integer
        mapHeight:
          type: integer
        tiles:
          type: array
          items:
            type: array
            items:
              type: string
        playerSpawns:
          type: array
          items:
            $ref: '#/components/schemas/Position'
        enemyPlacements:
          type: array
          items:
            $ref: '#/components/schemas/EnemyPlacement'

    LevelBundleExportData:
      type: object
      properties:
        _format:
          type: string
          enum: [blast-arena-level-bundle]
        _version:
          type: integer
          enum: [1]
        level:
          type: object
        enemyTypes:
          type: array
          items:
            type: object
            properties:
              originalId:
                type: integer
              name:
                type: string
              description:
                type: string
              config:
                $ref: '#/components/schemas/EnemyTypeConfig'

    EnemyTypeExportData:
      type: object
      properties:
        _format:
          type: string
          enum: [blast-arena-enemy-type]
        _version:
          type: integer
          enum: [1]
        name:
          type: string
        description:
          type: string
        config:
          $ref: '#/components/schemas/EnemyTypeConfig'

    ImportConflict:
      type: object
      properties:
        originalId:
          type: integer
        name:
          type: string
        existingId:
          type: integer
        existingName:
          type: string

    SortOrderRequest:
      type: object
      required: [sortOrder]
      properties:
        sortOrder:
          type: integer
          minimum: 0

    # ---- Settings ----
    GameDefaults:
      type: object
      properties:
        gameMode:
          $ref: '#/components/schemas/GameMode'
        maxPlayers:
          type: integer
          minimum: 2
          maximum: 8
        roundTime:
          type: integer
          minimum: 30
          maximum: 600
        mapWidth:
          type: integer
          minimum: 11
          maximum: 61
        wallDensity:
          type: number
          minimum: 0
          maximum: 1
        powerUpDropRate:
          type: number
          minimum: 0
          maximum: 1
        botCount:
          type: integer
          minimum: 0
          maximum: 7
        botDifficulty:
          $ref: '#/components/schemas/BotDifficulty'
        reinforcedWalls:
          type: boolean
        enableMapEvents:
          type: boolean
        hazardTiles:
          type: boolean
        friendlyFire:
          type: boolean
        enabledPowerUps:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpType'
        botAiId:
          type: string
          maxLength: 36

    SimulationDefaults:
      allOf:
        - $ref: '#/components/schemas/GameDefaults'
        - type: object
          properties:
            totalGames:
              type: integer
              minimum: 1
              maximum: 1000
            speed:
              type: string
              enum: [fast, realtime]
            logVerbosity:
              type: string
              enum: [normal, detailed, full]
            recordReplays:
              type: boolean

    EmailSettings:
      type: object
      properties:
        smtpHost:
          type: string
          maxLength: 255
        smtpPort:
          type: integer
          minimum: 1
          maximum: 65535
        smtpUser:
          type: string
          maxLength: 255
        smtpPassword:
          type: string
          maxLength: 255
          description: Masked in GET responses
        fromEmail:
          type: string
          format: email
          maxLength: 255
        fromName:
          type: string
          maxLength: 100

    # ---- Admin ----
    AdminUserListItem:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        role:
          $ref: '#/components/schemas/UserRole'
        emailVerified:
          type: boolean
        isDeactivated:
          type: boolean
        deactivatedAt:
          type: string
          format: date-time
          nullable: true
        lastLogin:
          type: string
          format: date-time
          nullable: true
        createdAt:
          type: string
          format: date-time
        totalMatches:
          type: integer
        totalWins:
          type: integer

    AdminStats:
      type: object
      properties:
        totalUsers:
          type: integer
        activeUsers24h:
          type: integer
        totalMatches:
          type: integer
        activeRooms:
          type: integer
        activePlayers:
          type: integer

    AdminAction:
      type: object
      properties:
        id:
          type: integer
        adminId:
          type: integer
        adminUsername:
          type: string
        action:
          type: string
        targetType:
          type: string
        targetId:
          type: integer
        details:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time

    AdminActiveRoom:
      type: object
      properties:
        code:
          type: string
        name:
          type: string
        host:
          type: string
        players:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              username:
                type: string
              isBot:
                type: boolean
        gameMode:
          type: string
        status:
          type: string
        maxPlayers:
          type: integer
        createdAt:
          type: string
          format: date-time

    AnnouncementBanner:
      type: object
      nullable: true
      properties:
        id:
          type: integer
        message:
          type: string
        adminUsername:
          type: string
        createdAt:
          type: string
          format: date-time

    # ---- Matches ----
    MatchHistoryItem:
      type: object
      properties:
        id:
          type: integer
        roomCode:
          type: string
        gameMode:
          type: string
        playerCount:
          type: integer
        status:
          type: string
        duration:
          type: integer
          nullable: true
        winnerUsername:
          type: string
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true

    MatchDetail:
      type: object
      properties:
        id:
          type: integer
        roomCode:
          type: string
        gameMode:
          type: string
        mapSeed:
          type: integer
        mapWidth:
          type: integer
        mapHeight:
          type: integer
        maxPlayers:
          type: integer
        status:
          type: string
        duration:
          type: integer
          nullable: true
        winnerId:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
          nullable: true
        finishedAt:
          type: string
          format: date-time
          nullable: true
        players:
          type: array
          items:
            $ref: '#/components/schemas/MatchPlayerDetail'

    MatchPlayerDetail:
      type: object
      properties:
        userId:
          type: integer
        username:
          type: string
        team:
          type: integer
          nullable: true
        placement:
          type: integer
          nullable: true
        kills:
          type: integer
        deaths:
          type: integer
        bombsPlaced:
          type: integer
        powerupsCollected:
          type: integer
        survivedSeconds:
          type: number

    # ---- Replays ----
    ReplayListItem:
      type: object
      properties:
        matchId:
          type: integer
        roomCode:
          type: string
        gameMode:
          type: string
        duration:
          type: number
        playerCount:
          type: integer
        winnerName:
          type: string
          nullable: true
        createdAt:
          type: string
          format: date-time
        fileSizeKB:
          type: number

    ReplayData:
      type: object
      description: Full replay data (gzipped JSON at rest, decompressed in response)
      properties:
        version:
          type: integer
        matchId:
          type: integer
        roomCode:
          type: string
        gameMode:
          type: string
        config:
          type: object
          properties:
            mapWidth:
              type: integer
            mapHeight:
              type: integer
            roundTime:
              type: integer
            wallDensity:
              type: number
            friendlyFire:
              type: boolean
            reinforcedWalls:
              type: boolean
            enableMapEvents:
              type: boolean
            hazardTiles:
              type: boolean
            botDifficulty:
              type: string
            botCount:
              type: integer
        totalTicks:
          type: integer
        tickRate:
          type: integer
        frames:
          type: array
          items:
            type: object
            description: Per-tick game state frame
        log:
          type: array
          items:
            type: object
            description: Replay log entry

    # ---- Simulations ----
    SimulationConfig:
      type: object
      required:
        - gameMode
        - botCount
        - botDifficulty
        - mapWidth
        - mapHeight
        - roundTime
        - wallDensity
        - enabledPowerUps
        - powerUpDropRate
        - friendlyFire
        - hazardTiles
        - reinforcedWalls
        - enableMapEvents
        - totalGames
        - speed
        - logVerbosity
      properties:
        gameMode:
          $ref: '#/components/schemas/GameMode'
        botCount:
          type: integer
          minimum: 2
          maximum: 8
        botDifficulty:
          $ref: '#/components/schemas/BotDifficulty'
        mapWidth:
          type: integer
          minimum: 11
          maximum: 61
        mapHeight:
          type: integer
          minimum: 11
          maximum: 61
        roundTime:
          type: integer
          minimum: 30
          maximum: 600
        wallDensity:
          type: number
          minimum: 0
          maximum: 1
        enabledPowerUps:
          type: array
          items:
            $ref: '#/components/schemas/PowerUpType'
        powerUpDropRate:
          type: number
          minimum: 0
          maximum: 1
        friendlyFire:
          type: boolean
        hazardTiles:
          type: boolean
        reinforcedWalls:
          type: boolean
        enableMapEvents:
          type: boolean
        totalGames:
          type: integer
          minimum: 1
          maximum: 1000
        speed:
          type: string
          enum: [fast, realtime]
        logVerbosity:
          type: string
          enum: [normal, detailed, full]
        botTeams:
          type: array
          items:
            type: integer
            nullable: true
        recordReplays:
          type: boolean
        botAiId:
          type: string
          maxLength: 36

    SimulationBatchStatus:
      type: object
      properties:
        batchId:
          type: string
        config:
          $ref: '#/components/schemas/SimulationConfig'
        status:
          type: string
          enum: [queued, running, completed, cancelled, error]
        queuePosition:
          type: integer
          nullable: true
        gamesCompleted:
          type: integer
        totalGames:
          type: integer
        currentGameTick:
          type: integer
          nullable: true
        currentGameMaxTicks:
          type: integer
          nullable: true
        startedAt:
          type: string
          format: date-time
        completedAt:
          type: string
          format: date-time
          nullable: true
        error:
          type: string

    SimulationGameResult:
      type: object
      properties:
        gameIndex:
          type: integer
        winnerId:
          type: integer
          nullable: true
        winnerName:
          type: string
          nullable: true
        finishReason:
          type: string
        durationTicks:
          type: integer
        durationSeconds:
          type: number
        mapSeed:
          type: integer
        hasReplay:
          type: boolean
        placements:
          type: array
          items:
            type: object
            properties:
              id:
                type: integer
              name:
                type: string
              kills:
                type: integer
              selfKills:
                type: integer
              deaths:
                type: integer
              placement:
                type: integer
              alive:
                type: boolean
              team:
                type: integer
                nullable: true
              bombsPlaced:
                type: integer
              powerupsCollected:
                type: integer

    # ---- Bot AI ----
    BotAIEntry:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        description:
          type: string
        filename:
          type: string
        isBuiltin:
          type: boolean
        isActive:
          type: boolean
        uploadedBy:
          type: string
          nullable: true
        uploadedAt:
          type: string
          format: date-time
        version:
          type: integer
        fileSize:
          type: integer
          description: File size in bytes
