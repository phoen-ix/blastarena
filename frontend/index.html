    .panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-5) var(--sp-6);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .panel-header-title {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      color: var(--text);
      letter-spacing: 0.5px;
    }

    .panel-header-close {
      background: none;
      border: 1px solid var(--border);
      color: var(--text-dim);
      font-size: 16px;
      cursor: pointer;
      padding: var(--sp-1) var(--sp-2);
      border-radius: var(--radius);
      transition: all var(--transition);
      font-family: var(--font-body);
    }

    .panel-header-close:hover {
      color: var(--text);
      background: var(--bg-hover);
      border-color: var(--border-bright);
    }

    .panel-content {
      flex: 1;
      overflow-y: auto;
      padding: var(--sp-6);
    }

    .panel-content.compact {
      padding: var(--sp-4);
    }

    .content-section {
      margin-bottom: var(--sp-6);
    }

    .content-section-title {
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: var(--sp-3);
      font-family: var(--font-display);
    }

    /* ================================================
       UNIFIED TAB BAR
       ================================================ */
    .tab-bar {
      display: flex;
      gap: 0;
      border-bottom: 2px solid var(--border);
      flex-shrink: 0;
      overflow-x: auto;
      padding: 0 var(--sp-6);
    }

    .tab-item {
      padding: var(--sp-3) var(--sp-5);
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      font-family: var(--font-display);
      letter-spacing: 0.5px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all var(--transition);
      white-space: nowrap;
    }

    .tab-item:hover {
      color: var(--text);
      background: var(--bg-hover);
    }

    .tab-item.active {
      color: var(--text);
      border-bottom-color: var(--primary);
      background: var(--bg-hover);
    }

    .tab-bar.compact .tab-item {
      flex: 1;
      padding: var(--sp-2) 0;
      text-align: center;
      font-size: 12px;
    }

    /* ================================================
       DATA TABLE
       ================================================ */
    .data-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--bg-surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .data-table th {
      background: var(--bg-elevated);
      padding: var(--sp-3) var(--sp-4);
      text-align: left;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--font-display);
      border-bottom: 2px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .data-table td {
      padding: var(--sp-3) var(--sp-4);
      font-size: 13px;
      border-bottom: 1px solid var(--border);
    }

    .data-table tbody tr {
      transition: background var(--transition);
    }

    .data-table tbody tr:nth-child(even) {
      background: rgba(20, 20, 42, 0.3);
    }

    .data-table tbody tr:hover {
      background: var(--bg-hover);
    }

    .data-table tbody tr.clickable {
      cursor: pointer;
    }

    .data-table tbody tr.clickable:hover {
      background: var(--primary-dim);
    }

    .data-table .col-center { text-align: center; }
    .data-table .col-right { text-align: right; }
    .data-table .col-number { font-family: var(--font-display); font-weight: 600; text-align: right; }

    .data-table.compact th,
    .data-table.compact td {
      padding: var(--sp-2) var(--sp-3);
      font-size: 12px;
    }

    /* ================================================
       FORM ELEMENTS
       ================================================ */
    .input {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    .input::placeholder {
      color: var(--text-muted);
    }

    .input.sm {
      padding: 7px 10px;
      font-size: 12px;
    }

    .select {
      width: 100%;
      padding: 10px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      cursor: pointer;
      transition: border-color var(--transition);
    }

    .select:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    /* Toggle Switch */
    .toggle-switch {
      position: relative;
      width: 40px;
      height: 22px;
      flex-shrink: 0;
      display: inline-block;
    }

    .toggle-switch input {
      opacity: 0;
      width: 0;
      height: 0;
      position: absolute;
    }

    .toggle-slider {
      position: absolute;
      inset: 0;
      background: var(--border-bright);
      border-radius: 11px;
      cursor: pointer;
      transition: background var(--transition);
    }

    .toggle-slider::before {
      content: '';
      position: absolute;
      left: 2px;
      top: 2px;
      width: 18px;
      height: 18px;
      background: var(--text);
      border-radius: 50%;
      transition: transform var(--transition);
    }

    .toggle-switch input:checked + .toggle-slider {
      background: var(--primary);
    }

    .toggle-switch input:checked + .toggle-slider::before {
      transform: translateX(18px);
    }

    /* Setting Row */
    .setting-row {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: var(--sp-2);
      transition: background var(--transition);
    }

    .setting-row:hover {
      background: var(--bg-elevated);
    }

    .setting-row-info {
      flex: 1;
    }

    .setting-row-label {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .setting-row-desc {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    /* Form Grid */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: var(--sp-3);
    }

    .form-grid .form-group { margin-bottom: 0; }
    .form-grid .span-2 { grid-column: span 2; }
    .form-grid .span-full { grid-column: 1 / -1; }

    .form-grid-2col {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: var(--sp-2);
    }

    .form-grid-2col .form-group { margin-bottom: 0; }

    /* Collapsible Section */
    .collapsible-toggle {
      background: none;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-2) var(--sp-3);
      cursor: pointer;
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      width: 100%;
      text-align: left;
      display: flex;
      justify-content: space-between;
      align-items: center;
      transition: border-color var(--transition);
    }

    .collapsible-toggle:hover {
      border-color: var(--border-bright);
    }

    .collapsible-arrow {
      transition: transform 0.2s;
    }

    .collapsible-body {
      display: none;
      padding: var(--sp-3) var(--sp-4);
      margin-top: var(--radius-sm);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* Settings Card (Dashboard) */
    .settings-card {
      margin-top: 20px;
    }

    .settings-card > h3 {
      color: var(--text);
      font-size: 15px;
      margin-bottom: var(--sp-3);
      font-weight: 600;
    }

    .settings-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    /* Setting Item (inline setting with label + control + description) */
    .setting-item {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    .setting-item-label {
      color: var(--text);
      font-weight: 600;
      font-size: 14px;
    }

    .setting-item-desc {
      color: var(--text-dim);
      font-size: 12px;
    }

    .setting-item-checkbox {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      cursor: pointer;
      font-size: 14px;
    }

    .setting-item-checkbox input[type="checkbox"] {
      accent-color: var(--accent);
      width: 16px;
      height: 16px;
    }

    .setting-item-checkbox .setting-item-label {
      cursor: pointer;
    }

    /* Status Dot */
    .status-indicator {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }

    .status-indicator.active { background: var(--success); }
    .status-indicator.inactive { background: var(--danger); }

    /* Override Count Badge */
    .override-badge {
      color: var(--accent);
      font-size: 11px;
    }

    /* Checkbox/Option Labels (inline) */
    .option-label {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 12px;
      cursor: pointer;
    }

    .option-label-sm {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 11px;
      cursor: pointer;
    }

    /* Inline Flex Row Utilities */
    .flex-row {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
    }

    .flex-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
    }

    .flex-gap-sm {
      gap: 6px;
    }

    .ml-auto { margin-left: auto; }

    /* Subsection Label */
    .subsection-label {
      font-size: 11px;
      color: var(--text-dim);
      font-weight: 600;
      margin-bottom: 4px;
    }

    /* Collapsible Section Spacing */
    .collapsible-section {
      margin-top: var(--sp-3);
    }

    /* Password Field Wrapper */
    .pw-field {
      position: relative;
    }

    .pw-toggle {
      position: absolute;
      right: 4px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-dim);
      font-size: 11px;
      padding: 2px 4px;
    }

    .pw-field input { padding-right: 30px; }

    /* Margin Utilities */
    .mt-sm { margin-top: 10px; }
    .mt-md { margin-top: 14px; }

    /* Button Utilities */
    .nowrap { white-space: nowrap; }

    /* Width Utilities */
    .w-full { width: 100%; }

    /* Default Indicator */
    .default-indicator {
      color: var(--text-muted);
      font-size: 10px;
    }

    /* Option Chip */
    .option-chip {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 10px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      font-size: 12px;
      transition: all var(--transition);
    }

    .option-chip span {
      font-weight: 600;
    }

    .option-chip:hover {
      border-color: var(--border-bright);
      background: var(--bg-surface);
    }

    .option-chips {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
      align-items: center;
    }

    /* ================================================
       CARDS
       ================================================ */
    .mini-stat {
      background: var(--bg-deep);
      border-radius: var(--radius);
      padding: var(--sp-3);
      text-align: center;
      border: 1px solid var(--border);
    }

    .mini-stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-display);
    }

    .mini-stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 2px;
    }

    .room-card.waiting { border-left-color: var(--success); }
    .room-card.playing { border-left-color: var(--warning); }

    /* ================================================
       SLIDE-OUT PANELS
       ================================================ */
    .slide-panel {
      position: fixed;
      top: 0;
      right: 0;
      height: 100%;
      background: var(--bg-base);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      font-family: var(--font-body);
      transform: translateX(100%);
      transition: transform 0.25s ease;
      box-shadow: -4px 0 24px rgba(0, 0, 0, 0.4);
    }

    .slide-panel.open {
      transform: translateX(0);
    }

    .slide-panel.w-sm { width: 320px; }
    .slide-panel.w-md { width: 360px; }
    .slide-panel.w-lg { width: 400px; }
    .slide-panel.w-profile { width: 380px; z-index: 202; }

    /* ================================================
       PROFILE PANEL
       ================================================ */
    .profile-identity {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: var(--sp-5);
    }

    .profile-avatar {
      width: 52px;
      height: 52px;
      border-radius: var(--radius-lg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      font-weight: 700;
      color: #fff;
      font-family: var(--font-display);
      flex-shrink: 0;
    }

    .profile-username {
      font-size: 18px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-display);
    }

    .profile-join-date {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .profile-role-badge {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      margin-left: var(--sp-2);
    }

    .profile-rank-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      padding: 14px;
      margin-bottom: var(--sp-4);
    }

    .profile-rank-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: var(--sp-3);
    }

    .profile-rank-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }

    .profile-rank-value {
      font-size: 16px;
      font-weight: 700;
      font-family: var(--font-display);
    }

    .profile-level-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--primary);
      font-family: var(--font-display);
    }

    .profile-elo-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-display);
    }

    .profile-elo-peak {
      font-size: 11px;
      color: var(--text-muted);
    }

    .profile-xp-bar {
      margin-top: 6px;
    }

    .profile-xp-labels {
      display: flex;
      justify-content: space-between;
      font-size: 10px;
      color: var(--text-muted);
      margin-bottom: 3px;
    }

    .profile-xp-track {
      height: 4px;
      background: var(--bg-surface);
      border-radius: 2px;
      overflow: hidden;
    }

    .profile-xp-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      border-radius: 2px;
      transition: width 0.3s;
    }

    .profile-section-title {
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: var(--sp-2);
    }

    .profile-stats-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: var(--sp-2);
      margin-bottom: var(--sp-4);
    }

    .profile-stat-item {
      background: var(--bg-deep);
      border-radius: var(--radius);
      padding: var(--sp-3);
      text-align: center;
    }

    .profile-stat-value {
      font-size: 16px;
      font-weight: 700;
      color: var(--text);
      font-family: var(--font-display);
    }

    .profile-stat-label {
      font-size: 10px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      margin-top: 2px;
    }

    .profile-season-table {
      width: 100%;
      border-collapse: collapse;
    }

    .profile-season-table th {
      padding: var(--sp-2);
      text-align: left;
      font-size: 11px;
      color: var(--text-muted);
      font-weight: 600;
    }

    .profile-season-table th.col-center,
    .profile-season-table td.col-center {
      text-align: center;
    }

    .profile-season-table thead tr {
      border-bottom: 1px solid var(--border);
    }

    .profile-season-table td {
      padding: 6px var(--sp-2);
      font-size: 13px;
    }

    .profile-season-table td.text-primary {
      color: var(--text);
    }

    .profile-season-table td.text-dim {
      color: var(--text-dim);
    }

    .profile-season-card {
      background: var(--bg-card);
      border-radius: var(--radius-lg);
      overflow: hidden;
      margin-bottom: var(--sp-4);
    }

    .profile-achievement {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      padding: var(--sp-2) var(--sp-3);
      background: var(--bg-deep);
      border-radius: var(--radius);
    }

    .profile-achievement-icon {
      font-size: 18px;
      flex-shrink: 0;
    }

    .profile-achievement-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .profile-achievements-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 6px;
      margin-bottom: var(--sp-4);
    }

    .profile-cosmetics {
      display: flex;
      gap: var(--sp-2);
      flex-wrap: wrap;
      margin-bottom: var(--sp-4);
    }

    .profile-cosmetic-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px var(--sp-3);
      background: var(--bg-card);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text);
    }

    .profile-cosmetic-icon {
      font-size: 16px;
    }

    .profile-actions {
      padding-top: var(--sp-2);
      display: flex;
      gap: var(--sp-2);
    }

    .profile-actions .btn {
      flex: 1;
    }

    .profile-progress-item {
      padding: var(--sp-2) var(--sp-3);
      background: var(--bg-deep);
      border-radius: var(--radius);
    }

    .profile-progress-header {
      display: flex;
      align-items: center;
      gap: var(--sp-2);
      margin-bottom: 4px;
    }

    .profile-progress-icon {
      font-size: 16px;
      flex-shrink: 0;
    }

    .profile-progress-name {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }

    .profile-progress-count {
      font-size: 11px;
      color: var(--text-muted);
      flex-shrink: 0;
    }

    .profile-progress-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 6px;
      margin-bottom: var(--sp-4);
    }

    .profile-empty-msg {
      text-align: center;
      padding: 60px var(--sp-4);
      color: var(--text-dim);
      font-size: 14px;
    }

    .profile-empty-msg.muted {
      color: var(--text-muted);
    }

    /* ================================================
       MODAL IMPROVEMENTS
       ================================================ */
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: var(--sp-5) var(--sp-6);
      border-bottom: 1px solid var(--border);
    }

    .modal-header h2 {
      margin: 0;
      color: var(--primary);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 18px;
      letter-spacing: 1px;
    }

    .modal-body {
      padding: var(--sp-5) var(--sp-6);
      overflow-y: auto;
      flex: 1;
    }

    .modal-footer {
      display: flex;
      gap: var(--sp-3);
      padding: var(--sp-4) var(--sp-6);
      border-top: 1px solid var(--border);
    }

    .modal-footer .btn { flex: 1; }

    /* ================================================
       THEME PICKER
       ================================================ */
    .theme-picker {
      display: flex;
      gap: var(--sp-3);
      flex-wrap: wrap;
    }

    .theme-swatch {
      width: 80px;
      padding: var(--sp-3) var(--sp-2);
      background: var(--bg-surface);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      text-align: center;
      transition: all var(--transition);
    }

    .theme-swatch:hover {
      border-color: var(--border-bright);
      transform: translateY(-2px);
    }

    .theme-swatch.active {
      border-color: var(--primary);
      box-shadow: var(--shadow-glow-primary);
    }

    .theme-swatch-colors {
      display: flex;
      gap: 3px;
      margin-bottom: var(--sp-2);
      justify-content: center;
    }

    .theme-swatch-dot {
      width: 16px;
      height: 16px;
      border-radius: 50%;
      border: 1px solid var(--border);
    }

    .theme-swatch-name {
      font-size: 11px;
      font-weight: 600;
      color: var(--text);
      font-family: var(--font-display);
      letter-spacing: 0.3px;
    }

    /* ================================================
       SETTINGS UI
       ================================================ */
    .settings-panel {
      max-width: 500px;
    }

    .settings-panel.wide {
      max-width: 600px;
    }

    .settings-section-title {
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 700;
      margin-bottom: var(--sp-4);
    }

    .settings-separator {
      border-color: var(--border);
      margin: var(--sp-5) 0;
    }

    .settings-hint {
      font-size: 11px;
      color: var(--text-muted);
      margin-top: var(--sp-1);
    }

    .settings-status {
      margin: var(--sp-2) 0;
    }

    .settings-field-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .settings-current-value {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 10px;
    }

    .settings-current-value strong {
      color: var(--text);
    }

    .settings-pending-banner {
      color: var(--warning);
      font-size: 13px;
      margin-bottom: var(--sp-3);
      padding: 10px;
      background: var(--warning-dim);
      border: 1px solid var(--warning);
      border-radius: var(--radius);
    }

    .settings-toggle-list {
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
    }

    .privacy-option {
      display: flex;
      align-items: center;
      gap: var(--sp-3);
      padding: var(--sp-3) var(--sp-4);
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
    }

    .privacy-option input[type="checkbox"] {
      width: 18px;
      height: 18px;
      accent-color: var(--primary);
      cursor: pointer;
      flex-shrink: 0;
    }

    .privacy-option-label {
      font-weight: 600;
      font-size: 14px;
      color: var(--text);
    }

    .privacy-option-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    .cosmetic-slot {
      margin-bottom: var(--sp-6);
    }

    .cosmetic-slot-title {
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 700;
      margin-bottom: 10px;
    }

    .cosmetic-grid {
      display: flex;
      flex-wrap: wrap;
      gap: var(--sp-2);
    }

    .cosmetic-item {
      padding: var(--sp-2) var(--sp-3);
      border-radius: var(--radius-sm);
      border: 2px solid var(--border);
      background: var(--bg-surface);
      color: var(--text);
      cursor: pointer;
      font-size: 12px;
      transition: border-color var(--transition);
    }

    .cosmetic-item:hover:not(:disabled) {
      border-color: var(--border-bright);
    }

    .cosmetic-item.equipped {
      border-color: var(--primary);
    }

    .cosmetic-item:disabled {
      background: var(--bg-deep);
      color: var(--text-muted);
      cursor: not-allowed;
      opacity: 0.5;
    }

    .cosmetic-item .locked-label {
      font-size: 10px;
      color: var(--text-muted);
      display: block;
    }

    .cosmetic-color-dot {
      display: inline-block;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      vertical-align: middle;
      margin-right: var(--sp-1);
    }

    /* Cosmetic preview panel */
    .cosmetic-preview {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: var(--sp-6);
      padding: var(--sp-4) var(--sp-3);
      margin-bottom: var(--sp-6);
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
    }

    .cosmetic-preview-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: var(--sp-2);
    }

    .cosmetic-preview-label {
      font-size: 11px;
      color: var(--text-dim);
      font-family: var(--font-display);
      letter-spacing: 0.3px;
    }

    .cosmetic-preview-trail {
      min-width: 56px;
      text-align: center;
    }

    .cosmetic-preview-trail-dot {
      display: none;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      border: 2px solid var(--border-bright);
    }

    .text-success { color: var(--success); }
    .text-danger { color: var(--danger); }
    .text-warning { color: var(--warning); }
    .text-dim { color: var(--text-dim); }
    .text-accent { color: var(--accent); }

    .font-semibold { font-weight: 600; }

    .ml-1 { margin-left: 6px; }
    .ml-2 { margin-left: 8px; }
    .mt-3 { margin-top: var(--sp-3); }
    .mt-6 { margin-top: var(--sp-6); }

    .flex-1 { flex: 1; }

    /* Section header: flex row with space-between alignment */
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    /* Standalone admin section title (used outside .admin-section) */
    .admin-section-title {
      margin: 0;
      color: var(--text);
      font-size: 16px;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    /* Admin count label */
    .admin-count {
      color: var(--text-dim);
      font-size: 13px;
    }

    /* Flex button group */
    .btn-group {
      display: flex;
      gap: 8px;
    }

    /* Actions cell: flex row for table action buttons */
    .actions-cell {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    /* Form stack: vertical form layout within modals */
    .form-stack {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* Form row: horizontal pair layout within form stacks */
    .form-row {
      display: flex;
      gap: 12px;
    }

    .form-row > * { flex: 1; }
    .form-row > .form-row-half { flex: 0.5; }

    /* Form field label */
    .field-label {
      color: var(--text-dim);
      font-size: 13px;
      display: block;
    }

    /* Admin select with full-width styling (used in modal forms) */
    .admin-select.w-full {
      width: 100%;
      padding: 8px 12px;
      font-size: 14px;
    }

    /* Admin input/select top spacing when preceded by a label */
    .admin-input.mt-label,
    .admin-select.mt-label {
      margin-top: 4px;
    }

    /* Modal description text */
    .modal-desc {
      color: var(--text-dim);
      font-size: 13px;
      margin-bottom: 12px;
    }

    /* Modal hint/helper text */
    .modal-hint {
      color: var(--text-dim);
      font-size: 13px;
      margin-top: 8px;
    }

    /* Modal error message */
    .modal-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }

    /* Modal scrollable content */
    .modal-scroll {
      max-height: 85vh;
      overflow-y: auto;
    }

    /* Icon table cell */
    .icon-cell {
      font-size: 20px;
      text-align: center;
    }

    /* Truncated text cell */
    .truncate-cell {
      color: var(--text-dim);
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Conflict resolution card */
    .conflict-card {
      padding: 10px;
      background: var(--bg-elevated);
      border-radius: 6px;
      margin-bottom: 8px;
    }

    .conflict-card-name {
      font-weight: 600;
      margin-bottom: 6px;
    }

    .conflict-card-info {
      font-size: 12px;
      margin-bottom: 8px;
    }

    .conflict-card-options {
      display: flex;
      gap: 12px;
      font-size: 13px;
    }

    /* Color picker inline row */
    .color-picker-row {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 4px;
    }

    .color-picker-swatch {
      width: 48px;
      height: 36px;
      border: none;
      cursor: pointer;
    }

    /* Confirm delete button styling */
    .btn-danger.btn-confirm {
      padding: 8px 16px;
      font-size: 14px;
    }

    /* Import file input */
    .file-input {
      margin-bottom: 12px;
      color: var(--text);
    }

    /* Import preview text */
    .import-preview {
      display: none;
      margin-bottom: 12px;
    }

    /* Textarea with monospace for JSON editing */
    .admin-textarea-mono {
      margin-top: 4px;
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
      font-family: monospace;
      font-size: 12px;

    .camp-modal-title.warning {

    .camp-modal-actions {

    .camp-modal-actions.mt-sm {
      margin-top: var(--sp-3);
    }

    .camp-form-label {

      margin-bottom: 4px;

    }

    .camp-form-label.sm {

    }

    .camp-form-row {
      display: flex;

    }

    .camp-form-col {

    }

    .camp-checkbox-row {

      gap: var(--sp-3);
      flex-wrap: wrap;
    }

    .camp-checkbox-label {

      align-items: center;

    }

    .camp-enemy-right {
      width: 180px;

      flex-direction: column;
      gap: 10px;
    }

    .camp-preview-center {
      text-align: center;
      margin-bottom: 4px;
    }

    .camp-color-row {
      display: flex;
      gap: 6px;
    }

    .camp-color-input {
      width: 100%;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      cursor: pointer;
      background: transparent;
    }

    .camp-conflict-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: var(--sp-3);
      margin-bottom: var(--sp-2);
    }

      font-weight: 600;
      margin-bottom: 6px;

    }

    .camp-conflict-orig-id {

    }

    .camp-conflict-options {
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 13px;

    .camp-conflict-option {
      display: flex;
      align-items: center;
      gap: 4px;
      cursor: pointer;
    }

    .camp-import-status {
      color: var(--text-dim);
      font-size: 12px;
      margin-bottom: var(--sp-3);

    .camp-import-hint {

      margin: 0 0 var(--sp-3);

      font-size: 13px;
    }

    .camp-import-file-wrap {
      margin-bottom: var(--sp-4);
    }

    .camp-delete-confirm-text {
      color: var(--text-dim);

    .camp-delete-confirm-hint {
      color: var(--text-dim);
      margin: 0 0 var(--sp-4);
      font-size: 13px;
    }
    .mb-sm { margin-bottom: var(--sp-2); }
    .mb-md { margin-bottom: var(--sp-4); }
    .mb-0 { margin-bottom: 0; }

    /* Text utilities */
    .text-primary { color: var(--primary); }
    .text-accent { color: var(--accent); }
    .text-info { color: var(--info); }
    .text-sm { font-size: 13px; }
    .text-xs { font-size: 12px; }
    .text-center { text-align: center; }
    .fw-600 { font-weight: 600; }
    .text-capitalize { text-transform: capitalize; }

    /* Flex utilities */
    .flex-between {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .flex-center {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* ================================================
       SIMULATIONS TAB
       ================================================ */
    .sim-section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 16px;
    }

    .sim-section-header h3 {
      color: var(--text);
      margin: 0;
    }

    .sim-info-card {
      background: var(--bg-card);
      border-radius: 8px;
      padding: 16px;
      margin-bottom: 16px;
      border: 1px solid var(--border);
    }

    .sim-info-card h3,
    .sim-info-card h4 {
      color: var(--text);
      margin: 0;
    }

    .sim-info-card h4 {
      margin-bottom: 8px;
    }

    .sim-detail-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .sim-info-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 8px;
      font-size: 13px;
      color: var(--text-dim);
    }

    .sim-info-grid strong {
      color: var(--text);
    }

    .sim-progress-section {
      margin-top: 12px;
    }

    .sim-progress-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .sim-progress-label {
      font-size: 14px;
      color: var(--text);
    }

    .sim-progress-track {
      flex: 1;
      height: 8px;
      background: var(--bg-deep);
      border-radius: 4px;
      overflow: hidden;
    }

    .sim-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 4px;
      transition: width 0.3s;
    }

    .sim-progress-mini {
      flex: 1;
      max-width: 80px;
      height: 6px;
      background: var(--bg-card);
      border-radius: 3px;
      overflow: hidden;
    }

    .sim-progress-mini .sim-progress-fill {

    }

    .sim-tick-info {

      color: var(--text-dim);

      gap: 8px;

      flex-wrap: wrap;
      gap: 12px;
    }

    .sim-win-chip {
      background: var(--bg-hover);
      padding: 6px 12px;
      border-radius: 6px;
    }

    .sim-win-chip-name {
      color: var(--primary);
      font-weight: 600;
    }

    .sim-win-chip-count {
      color: var(--text-dim);
      margin-left: 4px;
    }

    .sim-status {
      font-weight: 600;
      text-transform: capitalize;
    }

    .sim-games-cell {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sim-td-actions {
      display: flex;
      gap: 4px;
    }

      display: flex;
      gap: 16px;
      flex-wrap: wrap;
    }

      display: flex;
      align-items: center;
      gap: 6px;
      color: var(--text-dim);
      cursor: pointer;
    }

      accent-color: var(--accent);
    }

    .sim-checkbox-label.accent-label span {
      color: var(--accent);
      font-weight: 600;
    }

      margin-top: 12px;
    }

    .sim-powerup-section > label {
      color: var(--text-dim);
      font-size: 13px;
    }

    .sim-powerup-chips {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-top: 6px;
    }

    .sim-powerup-label {
      display: flex;
      align-items: center;
      gap: 4px;
      color: var(--text-dim);
      cursor: pointer;
      font-size: 13px;
    }

      margin-bottom: 16px;
    }

    .sim-pagination {

      justify-content: center;
      align-items: center;
      gap: 12px;
      margin-top: 12px;

    .sim-pagination-info {
      color: var(--text-dim);
      font-size: 13px;
    }

    .sim-winner-cell {

    }

    .sim-reason-cell {
      color: var(--text-dim);
      font-size: 12px;
    }

    .sim-empty-row {

      color: var(--text-dim);
    }

    .sim-error {
      color: var(--danger);

    .sim-modal-grid {

      margin-top: 20px;

      max-width: 95vw;

    /* ── Friends Page (full-width view) ── */
    .friends-page {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
    }

    .friends-page-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: var(--sp-4);

      padding: 0;

      flex-shrink: 0;

      gap: var(--sp-2);

      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: var(--sp-2);
      padding: var(--sp-4) var(--sp-6);

      align-items: center;
      gap: var(--sp-3);

      border-radius: var(--radius);

      color: var(--text);

      flex-shrink: 0;

      right: 0;

      height: 10px;

      background: var(--text-muted);

      color: var(--text-muted);

    .friend-card-activity.active {

      color: var(--warning);

      gap: var(--sp-1);
      flex-shrink: 0;
