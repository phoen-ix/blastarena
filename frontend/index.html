<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BlastArena</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet">
  <style>
    /* ================================================
       BLAST ARENA — INFERNO Design System
       ================================================ */

    :root {
      --bg-deep: #080810;
      --bg-base: #0c0c16;
      --bg-surface: #14142a;
      --bg-elevated: #1c1c34;
      --bg-hover: #24243e;
      --border: #2a2a48;
      --border-bright: #383860;
      --primary: #ff6b35;
      --primary-hover: #ff8555;
      --primary-dim: rgba(255, 107, 53, 0.12);
      --primary-glow: 0 0 20px rgba(255, 107, 53, 0.25);
      --accent: #00d4aa;
      --accent-dim: rgba(0, 212, 170, 0.12);
      --danger: #ff3355;
      --danger-dim: rgba(255, 51, 85, 0.12);
      --warning: #ffaa22;
      --warning-dim: rgba(255, 170, 34, 0.12);
      --success: #00e676;
      --success-dim: rgba(0, 230, 118, 0.12);
      --info: #448aff;
      --info-dim: rgba(68, 138, 255, 0.12);
      --text: #eae8e4;
      --text-dim: #8888a0;
      --text-muted: #505068;
      --team-red: #ff4466;
      --team-blue: #448aff;
      --font-display: 'Chakra Petch', sans-serif;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'Fira Code', 'JetBrains Mono', monospace;
      --radius-sm: 4px;
      --radius: 8px;
      --radius-lg: 12px;
      --radius-xl: 16px;
      --transition: 150ms ease;
      --transition-slow: 300ms ease;
    }

    /* Reset & Base */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg-deep);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      overflow: hidden;
      width: 100vw;
      height: 100vh;
    }

    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: var(--bg-base); }
    ::-webkit-scrollbar-thumb { background: var(--border-bright); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    /* Layout */
    #game-container {
      width: 100%;
      height: 100%;
      position: relative;
    }

    #ui-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 100;
    }

    #ui-overlay > * {
      pointer-events: auto;
    }

    #game-container canvas {
      position: relative;
      z-index: 1;
    }

    /* Connection Overlay */
    .connection-overlay {
      position: fixed;
      inset: 0;
      background: rgba(8, 8, 16, 0.85);
      backdrop-filter: blur(8px);
      z-index: 9999;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .connection-message {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      color: var(--text);
      font-size: 18px;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 1px;
    }

    .connection-spinner {
      width: 40px;
      height: 40px;
      border: 3px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    /* ============ AUTH ============ */
    .auth-overlay {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(8, 8, 16, 0.8);
      backdrop-filter: blur(4px);
      z-index: 100;
    }

    .auth-form {
      background: var(--bg-surface);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-xl);
      padding: 40px;
      width: 420px;
      max-width: 90vw;
      box-shadow:
        0 0 80px rgba(255, 107, 53, 0.06),
        0 0 160px rgba(0, 212, 170, 0.03),
        0 20px 60px rgba(0, 0, 0, 0.4);
      animation: modalIn 0.3s ease;
    }

    .auth-form h2 {
      text-align: center;
      margin-bottom: 28px;
      color: var(--primary);
      font-size: 28px;
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .auth-form h2 span {
      color: var(--text);
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group label {
      display: block;
      margin-bottom: 6px;
      font-size: 13px;
      color: var(--text-dim);
      font-weight: 500;
      letter-spacing: 0.3px;
    }

    .form-group input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .form-group input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    .form-group input::placeholder {
      color: var(--text-muted);
    }

    .form-group select {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      cursor: pointer;
      transition: border-color var(--transition);
    }

    .form-group select:focus {
      border-color: var(--primary);
    }

    .form-error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      text-align: center;
    }

    .auth-switch {
      text-align: center;
      margin-top: 16px;
      font-size: 14px;
      color: var(--text-dim);
    }

    .auth-switch a {
      color: var(--primary);
      cursor: pointer;
      text-decoration: none;
      font-weight: 600;
      transition: color var(--transition);
    }

    .auth-switch a:hover {
      color: var(--primary-hover);
      text-decoration: underline;
    }

    /* ============ BUTTONS ============ */
    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      padding: 10px 20px;
      border: none;
      border-radius: var(--radius);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: all var(--transition);
      text-align: center;
      letter-spacing: 0.3px;
      white-space: nowrap;
    }

    .btn-primary {
      background: var(--primary);
      color: #fff;
      box-shadow: 0 2px 8px rgba(255, 107, 53, 0.25);
    }

    .btn-primary:hover {
      background: var(--primary-hover);
      box-shadow: 0 4px 16px rgba(255, 107, 53, 0.35);
      transform: translateY(-1px);
    }

    .btn-primary:active {
      transform: translateY(0);
    }

    .auth-form .btn-primary {
      width: 100%;
      padding: 12px;
      font-size: 15px;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
    }

    .btn-secondary {
      background: transparent;
      color: var(--primary);
      border: 1px solid var(--primary);
    }

    .btn-secondary:hover {
      background: var(--primary-dim);
    }

    .btn-ghost {
      background: transparent;
      color: var(--text-dim);
      border: 1px solid transparent;
    }

    .btn-ghost:hover {
      color: var(--text);
      background: var(--bg-hover);
      border-color: var(--border);
    }

    .btn:disabled {
      opacity: 0.4;
      cursor: not-allowed;
      transform: none !important;
      box-shadow: none !important;
    }

    .btn-danger {
      background: var(--danger-dim);
      color: var(--danger);
      border: 1px solid var(--danger);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-body);
      font-weight: 600;
      transition: all var(--transition);
    }

    .btn-danger:hover {
      background: rgba(255, 51, 85, 0.25);
    }

    .btn-warn {
      background: var(--warning-dim);
      color: var(--warning);
      border: 1px solid var(--warning);
      padding: 6px 12px;
      border-radius: var(--radius-sm);
      cursor: pointer;
      font-size: 12px;
      font-family: var(--font-body);
      font-weight: 600;
      transition: all var(--transition);
    }

    .btn-warn:hover {
      background: rgba(255, 170, 34, 0.25);
    }

    .btn-sm {
      padding: 5px 10px;
      font-size: 12px;
    }

    /* ============ TOASTS ============ */
    #toast-container {
      position: fixed;
      bottom: 20px;
      right: 20px;
      z-index: 1000;
      display: flex;
      flex-direction: column-reverse;
      gap: 8px;
    }

    .toast {
      padding: 14px 20px;
      border-radius: var(--radius);
      font-size: 14px;
      font-family: var(--font-body);
      animation: slideIn 0.3s ease;
      min-width: 280px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
      backdrop-filter: blur(12px);
      border-left: 3px solid;
    }

    .toast-success {
      background: rgba(0, 230, 118, 0.1);
      border-color: var(--success);
      color: var(--success);
    }

    .toast-error {
      background: rgba(255, 51, 85, 0.1);
      border-color: var(--danger);
      color: #ffb3c1;
    }

    .toast-info {
      background: rgba(68, 138, 255, 0.1);
      border-color: var(--info);
      color: #a0c4ff;
    }

    /* ============ LOBBY ============ */
    .lobby-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      padding: 0;
      background: var(--bg-base);
    }

    .lobby-container::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse at 15% 80%, rgba(255, 107, 53, 0.04) 0%, transparent 50%),
        radial-gradient(ellipse at 85% 20%, rgba(0, 212, 170, 0.03) 0%, transparent 50%);
      pointer-events: none;
      z-index: 0;
    }

    .lobby-container > * {
      position: relative;
      z-index: 1;
    }

    .lobby-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    .lobby-header h1 {
      color: var(--primary);
      font-size: 24px;
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    .lobby-header h1 span {
      color: var(--text);
    }

    .room-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 12px;
      flex: 1;
      overflow-y: auto;
      padding: 20px 24px;
    }

    .room-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-left: 3px solid var(--primary);
      border-radius: var(--radius);
      padding: 16px 18px;
      cursor: pointer;
      transition: all var(--transition);
      position: relative;
    }

    .room-card:hover {
      border-color: var(--primary);
      box-shadow: 0 4px 24px rgba(255, 107, 53, 0.12);
      transform: translateY(-2px);
      background: var(--bg-elevated);
    }

    .room-card h3 {
      margin-bottom: 10px;
      color: var(--text);
      font-family: var(--font-display);
      font-weight: 600;
      font-size: 16px;
      letter-spacing: 0.5px;
    }

    .room-card .room-info {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      color: var(--text-dim);
    }

    .room-card .room-mode {
      background: var(--primary-dim);
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 700;
      color: var(--primary);
      letter-spacing: 0.5px;
      font-family: var(--font-display);
      text-transform: uppercase;
    }

    /* ============ GAMEPAD FOCUS ============ */
    .gp-focus {
      outline: 2px solid var(--primary) !important;
      outline-offset: 2px;
      box-shadow: 0 0 12px rgba(255, 107, 53, 0.3) !important;
    }
    .room-card.gp-focus {
      border-color: var(--primary);
      background: var(--bg-elevated);
      transform: translateY(-2px);
    }

    /* Gamepad custom dropdown */
    .gp-dropdown {
      background: var(--bg-surface);
      border: 1px solid var(--primary);
      border-radius: var(--radius);
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6), 0 0 16px rgba(255, 107, 53, 0.15);
      max-height: 240px;
      overflow-y: auto;
      padding: 4px 0;
    }
    .gp-dropdown-item {
      padding: 8px 14px;
      font-size: 14px;
      font-family: var(--font-body);
      color: var(--text-dim);
      cursor: default;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .gp-dropdown-item.gp-dropdown-active {
      background: var(--primary);
      color: #fff;
      font-weight: 600;
    }

    /* ============ MODALS ============ */
    .modal-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(8, 8, 16, 0.75);
      backdrop-filter: blur(4px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }

    .modal {
      background: var(--bg-surface);
      border: 1px solid var(--border-bright);
      border-radius: var(--radius-lg);
      padding: 32px;
      width: 450px;
      max-width: 90vw;
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
      animation: modalIn 0.2s ease;
    }

    .modal h2 {
      margin-bottom: 20px;
      color: var(--primary);
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 20px;
      letter-spacing: 1px;
    }

    .modal-actions {
      display: flex;
      gap: 12px;
      margin-top: 20px;
    }

    .modal-actions .btn {
      flex: 1;
    }

    /* ============ SETTINGS ============ */
    .settings-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
      margin-bottom: 8px;
      font-family: var(--font-display);
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .settings-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 12px;
      font-size: 14px;
      cursor: pointer;
      border-radius: var(--radius);
      transition: background var(--transition);
    }

    .settings-option:hover {
      background: var(--bg-hover);
    }

    .settings-option input[type="checkbox"] {
      accent-color: var(--primary);
      width: 16px;
      height: 16px;
    }

    /* ============ HELP ============ */
    .help-section {
      margin-bottom: 16px;
    }

    .help-heading {
      font-size: 12px;
      font-weight: 700;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
      font-family: var(--font-display);
    }

    .help-row {
      font-size: 13px;
      padding: 4px 0;
      color: #d0d0d8;
      line-height: 1.5;
    }

    .help-key {
      display: inline-block;
      background: var(--bg-elevated);
      color: var(--text);
      padding: 2px 8px;
      border-radius: var(--radius-sm);
      font-size: 12px;
      font-weight: 600;
      font-family: var(--font-mono);
      margin-right: 4px;
      border: 1px solid var(--border);
    }

    .help-icon {
      display: inline-block;
      width: 28px;
      text-align: center;
      font-size: 14px;
    }

    .help-tip {
      font-size: 12px;
      color: var(--text-muted);
      font-style: italic;
      margin-bottom: 6px;
    }

    .help-pu {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      border-radius: var(--radius-sm);
      border: 1px solid rgba(255, 255, 255, 0.3);
      font-size: 11px;
      font-weight: 700;
      color: #fff;
      margin-right: 3px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    .help-hud {
      display: inline-block;
      width: 22px;
      text-align: center;
      font-size: 13px;
      margin-right: 4px;
      vertical-align: middle;
    }

    .help-tile {
      display: inline-block;
      width: 22px;
      height: 22px;
      border-radius: 3px;
      border: 1px solid rgba(255, 255, 255, 0.15);
      margin-right: 4px;
      vertical-align: middle;
      text-align: center;
      font-size: 8px;
      flex-shrink: 0;
    }

    /* Help: Power-up rows */
    .help-powerup-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid rgba(255, 255, 255, 0.05);
    }
    .help-powerup-row:last-child {
      border-bottom: none;
    }

    /* Help: Game mode cards */
    .help-mode-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      margin-bottom: 12px;
    }
    .help-mode-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .help-mode-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--primary);
      font-family: var(--font-display);
    }
    .help-mode-players {
      font-size: 12px;
      color: var(--text-dim);
      background: var(--bg-elevated);
      padding: 2px 10px;
      border-radius: 10px;
    }
    .help-mode-tags {
      display: flex;
      gap: 6px;
      margin-bottom: 6px;
    }
    .help-mode-tag {
      font-size: 11px;
      padding: 1px 8px;
      border-radius: 8px;
      background: var(--primary-dim);
      color: var(--primary);
      font-weight: 600;
    }
    .help-mode-desc {
      font-size: 13px;
      color: #d0d0d8;
      line-height: 1.6;
    }

    /* Help: Collapsible guide sections */
    .help-guide-section {
      margin-bottom: 12px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .help-guide-section summary {
      padding: 12px 16px;
      background: var(--bg-surface);
      color: var(--text);
      font-weight: 600;
      font-family: var(--font-display);
      cursor: pointer;
      transition: background var(--transition);
      list-style: none;
    }
    .help-guide-section summary::-webkit-details-marker {
      display: none;
    }
    .help-guide-section summary::before {
      content: '\25B6';
      display: inline-block;
      margin-right: 10px;
      font-size: 10px;
      transition: transform 0.2s;
      color: var(--primary);
    }
    .help-guide-section[open] summary::before {
      transform: rotate(90deg);
    }
    .help-guide-section summary:hover {
      background: var(--bg-hover);
    }

    /* Help: Markdown rendered content */
    .help-markdown {
      padding: 16px;
      line-height: 1.7;
      color: var(--text);
      font-size: 14px;
    }
    .help-markdown h1, .help-markdown h2, .help-markdown h3, .help-markdown h4 {
      color: var(--primary);
      font-family: var(--font-display);
      margin: 20px 0 10px;
    }
    .help-markdown h1 { font-size: 22px; }
    .help-markdown h2 {
      font-size: 18px;
      border-bottom: 1px solid var(--border);
      padding-bottom: 6px;
    }
    .help-markdown h3 { font-size: 15px; color: var(--text); }
    .help-markdown code {
      background: var(--bg-elevated);
      padding: 2px 6px;
      border-radius: var(--radius-sm);
      font-family: var(--font-mono);
      font-size: 13px;
      color: var(--accent);
    }
    .help-markdown pre {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      overflow-x: auto;
      margin: 12px 0;
    }
    .help-markdown pre code {
      background: none;
      padding: 0;
      color: var(--text);
    }
    .help-markdown table {
      width: 100%;
      border-collapse: collapse;
      margin: 12px 0;
    }
    .help-markdown th, .help-markdown td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
      font-size: 13px;
    }
    .help-markdown th {
      background: var(--bg-elevated);
      color: var(--text);
      font-weight: 600;
    }
    .help-markdown a {
      color: var(--accent);
      text-decoration: none;
    }
    .help-markdown a:hover {
      text-decoration: underline;
    }
    .help-markdown ul, .help-markdown ol {
      padding-left: 24px;
      margin: 8px 0;
    }
    .help-markdown li {
      margin: 4px 0;
    }
    .help-markdown blockquote {
      border-left: 3px solid var(--primary);
      margin: 12px 0;
      padding: 8px 16px;
      background: var(--bg-surface);
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    }
    .help-markdown img {
      max-width: 100%;
      border-radius: var(--radius);
    }

    /* ============ ADMIN BANNER ============ */
    .admin-banner {
      background: linear-gradient(90deg, var(--bg-elevated), var(--bg-surface));
      border: 1px solid var(--warning);
      border-radius: var(--radius);
      padding: 12px 18px;
      margin-bottom: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 14px;
      color: var(--warning);
      box-shadow: 0 2px 12px rgba(255, 170, 34, 0.1);
    }

    .admin-banner .banner-close {
      cursor: pointer;
      color: var(--text-muted);
      font-size: 18px;
      background: none;
      border: none;
      padding: 0 4px;
      transition: color var(--transition);
    }

    .admin-banner .banner-close:hover {
      color: var(--text);
    }

    /* ============ HUD ============ */
    .hud-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      pointer-events: none;
    }

    .hud-top {
      display: flex;
      justify-content: space-between;
      padding: 12px 20px;
    }

    .hud-timer {
      font-size: 26px;
      font-weight: 700;
      color: #fff;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.6);
      font-family: var(--font-display);
      letter-spacing: 2px;
    }

    .hud-powerups {
      display: flex;
      gap: 8px;
    }

    .hud-powerup {
      width: 36px;
      height: 36px;
      border-radius: var(--radius);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      background: rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .hud-players {
      position: absolute;
      top: 12px;
      right: 20px;
      font-size: 13px;
      font-family: var(--font-body);
    }

    .hud-player-item {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 3px;
      padding: 4px 10px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: var(--radius-sm);
      backdrop-filter: blur(4px);
      border: 1px solid transparent;
      transition: all var(--transition);
    }

    .hud-player-item.dead {
      opacity: 0.35;
      text-decoration: line-through;
    }

    .hud-player-item.clickable {
      cursor: pointer;
      pointer-events: auto;
    }

    .hud-player-item.clickable:hover {
      background: rgba(255, 107, 53, 0.3);
      border-color: var(--primary);
    }

    .hud-stats {
      display: flex;
      gap: 8px;
      align-items: center;
      pointer-events: none;
    }

    .stat-item {
      font-size: 14px;
      padding: 3px 8px;
      background: rgba(0, 0, 0, 0.5);
      border-radius: var(--radius-sm);
      transition: background 0.3s, color 0.3s;
      font-family: var(--font-body);
      backdrop-filter: blur(4px);
    }

    .stat-item.stat-changed {
      background: rgba(255, 107, 53, 0.5);
      animation: statFlash 0.5s ease;
    }

    .hud-killfeed {
      position: absolute;
      bottom: 60px;
      left: 20px;
      font-size: 13px;
      pointer-events: none;
    }

    .killfeed-entry {
      padding: 4px 10px;
      margin-bottom: 3px;
      background: rgba(0, 0, 0, 0.55);
      border-radius: var(--radius-sm);
      border-left: 2px solid var(--primary);
      backdrop-filter: blur(4px);
      transition: opacity 0.3s;
    }

    .hud-stats-bar {
      position: absolute;
      bottom: 12px;
      left: 12px;
      display: flex;
      gap: 6px;
      pointer-events: none;
    }

    .hud-spectator-banner {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(8, 8, 16, 0.75);
      border: 1px solid var(--primary);
      border-radius: var(--radius);
      padding: 10px 24px;
      font-size: 13px;
      color: var(--primary);
      text-align: center;
      pointer-events: none;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.5px;
      box-shadow: var(--primary-glow);
      backdrop-filter: blur(8px);
    }

    /* ============ ADMIN PANEL ============ */
    .admin-container {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: var(--bg-base);
      padding: 24px;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
    }

    .admin-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .admin-header h1 {
      font-family: var(--font-display);
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--primary);
    }

    .admin-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 24px;
      border-bottom: 2px solid var(--border);
    }

    .admin-tab {
      padding: 12px 22px;
      background: transparent;
      border: none;
      color: var(--text-dim);
      font-size: 14px;
      font-weight: 600;
      font-family: var(--font-display);
      letter-spacing: 0.5px;
      cursor: pointer;
      border-bottom: 2px solid transparent;
      margin-bottom: -2px;
      transition: all var(--transition);
    }

    .admin-tab:hover {
      color: var(--text);
      background: var(--primary-dim);
    }

    .admin-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
      background: var(--primary-dim);
    }

    .admin-tab-content {
      flex: 1;
      overflow-y: auto;
    }

    .admin-stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 14px;
      margin-bottom: 24px;
    }

    .stat-card {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      text-align: center;
      position: relative;
      overflow: hidden;
      transition: border-color var(--transition);
    }

    .stat-card:hover {
      border-color: var(--border-bright);
    }

    .stat-card::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--primary), var(--accent));
      opacity: 0.6;
    }

    .stat-card .stat-value {
      font-size: 32px;
      font-weight: 700;
      color: var(--primary);
      font-family: var(--font-display);
      letter-spacing: 1px;
    }

    .stat-card .stat-label {
      font-size: 13px;
      color: var(--text-dim);
      margin-top: 4px;
      font-weight: 500;
    }

    .admin-table {
      width: 100%;
      border-collapse: collapse;
      background: var(--bg-surface);
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }

    .admin-table th,
    .admin-table td {
      padding: 11px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .admin-table th {
      background: var(--bg-elevated);
      font-size: 12px;
      color: var(--text-dim);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-family: var(--font-display);
    }

    .admin-table td {
      font-size: 14px;
    }

    .admin-table tbody tr {
      transition: background var(--transition);
    }

    .admin-table tbody tr:hover td {
      background: var(--bg-hover);
    }

    .admin-search {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
    }

    .admin-search input {
      flex: 1;
      padding: 11px 14px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .admin-search input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    .admin-pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 10px;
      margin-top: 16px;
      padding: 12px;
    }

    .admin-pagination button {
      padding: 7px 14px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      font-family: var(--font-body);
      font-weight: 500;
      transition: all var(--transition);
    }

    .admin-pagination button:hover:not(:disabled) {
      border-color: var(--primary);
      background: var(--primary-dim);
    }

    .admin-pagination button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }

    .admin-pagination .page-info {
      font-size: 13px;
      color: var(--text-dim);
    }

    .admin-select {
      padding: 5px 10px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text);
      font-size: 12px;
      font-family: var(--font-body);
      cursor: pointer;
      transition: border-color var(--transition);
    }

    .admin-select:focus {
      border-color: var(--primary);
      outline: none;
    }

    .admin-input {
      padding: 11px 14px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      box-sizing: border-box;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .admin-input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    .admin-textarea {
      padding: 11px 14px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      outline: none;
      width: 100%;
      box-sizing: border-box;
      resize: vertical;
      min-height: 60px;
      transition: border-color var(--transition), box-shadow var(--transition);
    }

    .admin-textarea:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--primary-dim);
    }

    .admin-section {
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 20px;
      margin-bottom: 16px;
    }

    .admin-section h3 {
      margin: 0 0 12px 0;
      color: var(--text);
      font-size: 16px;
      font-family: var(--font-display);
      font-weight: 600;
      letter-spacing: 0.5px;
    }

    .admin-filters {
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      align-items: center;
      flex-wrap: wrap;
    }

    .admin-filters select {
      padding: 9px 14px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-body);
    }

    .confirm-input {
      width: 100%;
      padding: 11px 14px;
      background: var(--bg-deep);
      border: 1px solid var(--danger);
      border-radius: var(--radius);
      color: var(--text);
      font-size: 14px;
      font-family: var(--font-body);
      margin-top: 12px;
      box-sizing: border-box;
      outline: none;
      transition: box-shadow var(--transition);
    }

    .confirm-input:focus {
      box-shadow: 0 0 0 3px var(--danger-dim);
    }

    .toast-preview {
      margin: 12px 0;
      padding: 12px 20px;
      border-radius: var(--radius);
      background: var(--info-dim);
      border: 1px solid var(--info);
      color: #a0c4ff;
      font-size: 14px;
    }

    .match-detail-row {
      display: flex;
      gap: 16px;
      margin-bottom: 8px;
      font-size: 14px;
    }

    .match-detail-row .label {
      color: var(--text-dim);
      min-width: 100px;
      font-weight: 500;
    }

    .match-detail-row .value {
      color: var(--text);
    }

    .admin-room-players {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .admin-room-player {
      padding: 3px 10px;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      font-size: 12px;
    }

    /* ============ BADGES ============ */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: var(--radius-sm);
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.3px;
      text-transform: uppercase;
      font-family: var(--font-display);
    }

    .badge-admin { background: var(--primary-dim); color: var(--primary); border: 1px solid rgba(255, 107, 53, 0.3); }
    .badge-moderator { background: var(--info-dim); color: var(--info); border: 1px solid rgba(68, 138, 255, 0.3); }
    .badge-banned { background: var(--danger-dim); color: var(--danger); border: 1px solid rgba(255, 51, 85, 0.3); }
    .badge-user { background: var(--bg-elevated); color: var(--text-dim); border: 1px solid var(--border); }
    .badge-deactivated { background: rgba(80, 80, 104, 0.15); color: var(--text-muted); border: 1px solid var(--text-muted); }
    .badge-active { background: var(--success-dim); color: var(--success); border: 1px solid rgba(0, 230, 118, 0.3); }

    /* ============ ANIMATIONS ============ */
    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    @keyframes statFlash {
      0% { background: rgba(255, 107, 53, 0.7); color: #fff; }
      100% { background: rgba(0, 0, 0, 0.5); color: var(--text); }
    }

    @keyframes modalIn {
      from { transform: scale(0.95) translateY(10px); opacity: 0; }
      to { transform: scale(1) translateY(0); opacity: 1; }
    }

    /* ============ MISC ============ */
    .placeholder-removed {
      font-size: 13px;
    }

    /* Selection */
    ::selection {
      background: var(--primary);
      color: #fff;
    }

    /* ============ CAMPAIGN UI ============ */
    .campaign-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--bg-deep);
      z-index: 200;
      overflow-y: auto;
      font-family: 'DM Sans', sans-serif;
    }
    .campaign-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 20px 32px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
    }
    .campaign-header h1 {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 28px;
      margin: 0;
    }
    .campaign-content {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px;
    }
    .world-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 10px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .world-card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      cursor: pointer;
      transition: background 0.15s;
    }
    .world-card-header:hover {
      background: var(--bg-hover);
    }
    .world-card-title {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 20px;
      font-weight: 700;
    }
    .world-progress {
      font-size: 13px;
      color: var(--text-dim);
    }
    .world-levels {
      border-top: 1px solid var(--border);
      padding: 12px 20px;
    }
    .level-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 12px;
      border-radius: 6px;
      transition: background 0.15s;
    }
    .level-row:hover {
      background: var(--bg-hover);
    }
    .level-row.locked {
      opacity: 0.4;
      pointer-events: none;
    }
    .level-stars {
      color: #ffdd44;
      font-size: 16px;
      min-width: 60px;
    }
    .level-name {
      font-weight: 600;
      flex: 1;
    }
    .level-meta {
      font-size: 12px;
      color: var(--text-dim);
      margin-left: 12px;
    }
    .level-start-btn {
      padding: 4px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 700;
      cursor: pointer;
      font-size: 13px;
    }
    .level-start-btn:hover {
      filter: brightness(1.15);
    }

    /* ============ LEVEL EDITOR ============ */
    .editor-tool-palette {
      position: fixed;
      left: 0; top: 0; bottom: 0;
      width: 200px;
      background: var(--bg-card);
      border-right: 1px solid var(--border);
      z-index: 100;
      overflow-y: auto;
      font-family: 'DM Sans', sans-serif;
      padding: 8px;
    }
    .editor-tool-palette h3 {
      font-family: 'Chakra Petch', sans-serif;
      font-size: 12px;
      color: var(--text-dim);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin: 12px 0 6px;
      padding: 0 4px;
    }
    .editor-tool-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      width: 100%;
      padding: 6px 8px;
      background: transparent;
      border: 1px solid transparent;
      border-radius: 4px;
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      text-align: left;
    }
    .editor-tool-btn:hover {
      background: var(--bg-hover);
    }
    .editor-tool-btn.active {
      background: rgba(255, 107, 53, 0.15);
      border-color: var(--primary);
      color: var(--primary);
    }
    .editor-top-bar {
      position: fixed;
      top: 0; left: 200px; right: 0;
      height: 44px;
      background: var(--bg-card);
      border-bottom: 1px solid var(--border);
      z-index: 100;
      display: flex;
      align-items: center;
      padding: 0 16px;
      gap: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
    }
    .editor-top-bar input,
    .editor-top-bar select {
      background: var(--bg-deep);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 4px;
      padding: 4px 8px;
      font-size: 12px;
      font-family: 'DM Sans', sans-serif;
    }
    .editor-top-bar .btn-sm {
      padding: 4px 12px;
      font-size: 12px;
      border-radius: 4px;
      border: none;
      cursor: pointer;
      font-family: 'Chakra Petch', sans-serif;
      font-weight: 600;
    }
    .editor-top-bar .btn-save {
      background: var(--success);
      color: #fff;
    }
    .editor-top-bar .btn-back {
      background: var(--bg-hover);
      color: var(--text);
    }

    /* ================================================
       Friends Panel
       ================================================ */
    .friends-panel {
      position: fixed;
      right: -340px;
      top: 0;
      width: 340px;
      height: 100%;
      background: var(--bg-base);
      border-left: 1px solid var(--border);
      z-index: 200;
      display: flex;
      flex-direction: column;
      transition: right 0.25s ease;
      font-family: var(--font-body);
    }
    .friends-panel.open {
      right: 0;
    }
    .friends-panel-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      border-bottom: 1px solid var(--border);
    }
    .friends-panel-header h3 {
      font-family: var(--font-display);
      font-weight: 700;
      font-size: 16px;
      color: var(--text);
    }
    .friends-panel-close {
      background: none;
      border: none;
      color: var(--text-dim);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px;
    }
    .friends-panel-close:hover { color: var(--text); }
    .friends-tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
    }
    .friends-tab {
      flex: 1;
      padding: 10px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--text-dim);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all var(--transition);
    }
    .friends-tab:hover { color: var(--text); }
    .friends-tab.active {
      color: var(--primary);
      border-bottom-color: var(--primary);
    }
    .friends-tab .badge {
      display: inline-block;
      background: var(--danger);
      color: #fff;
      font-size: 10px;
      font-weight: 700;
      padding: 1px 5px;
      border-radius: 8px;
      margin-left: 4px;
      vertical-align: middle;
    }
    .friends-search {
      padding: 12px 16px;
      display: flex;
      gap: 8px;
    }
    .friends-search input {
      flex: 1;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 8px 12px;
      color: var(--text);
      font-size: 13px;
      font-family: var(--font-body);
      outline: none;
    }
    .friends-search input:focus {
      border-color: var(--primary);
    }
    .friends-search button {
      padding: 8px 14px;
      font-size: 12px;
    }
    .friends-list {
      flex: 1;
      overflow-y: auto;
      padding: 8px 12px;
    }
    .friend-item {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      border-radius: var(--radius);
      transition: background var(--transition);
    }
    .friend-item:hover { background: var(--bg-surface); }
    .friend-avatar {
      width: 36px;
      height: 36px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 15px;
      color: rgba(0,0,0,0.5);
      font-family: var(--font-display);
      position: relative;
      flex-shrink: 0;
    }
    .friend-avatar .status-dot {
      position: absolute;
      bottom: -2px;
      right: -2px;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      border: 2px solid var(--bg-base);
    }
    .status-dot.online { background: var(--success); }
    .status-dot.in_lobby { background: var(--success); }
    .status-dot.in_game { background: var(--warning); }
    .status-dot.in_campaign { background: var(--info); }
    .status-dot.offline { background: var(--text-muted); }
    .friend-info {
      flex: 1;
      min-width: 0;
    }
    .friend-name {
      font-weight: 600;
      font-size: 13px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .friend-activity {
      font-size: 11px;
      color: var(--text-muted);
    }
    .friend-activity.active { color: var(--success); }
    .friend-activity.in-game { color: var(--warning); }
    .friend-actions {
      display: flex;
      gap: 4px;
      flex-shrink: 0;
    }
    .friend-actions .btn {
      padding: 4px 10px;
      font-size: 11px;
      border-radius: var(--radius-sm);
    }

    /* Party Bar */
    .party-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
    }
    .party-bar .party-label {
      color: var(--accent);
      font-weight: 700;
      font-family: var(--font-display);
      font-size: 12px;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }
    .party-members {
      display: flex;
      gap: 6px;
      flex: 1;
    }
    .party-member-chip {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--bg-elevated);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      font-size: 12px;
      color: var(--text);
    }
    .party-member-chip .leader-icon {
      color: var(--warning);
      font-size: 10px;
    }
    .party-member-avatar {
      width: 22px;
      height: 22px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: bold;
      font-size: 11px;
      color: rgba(0,0,0,0.5);
      background: var(--accent);
    }

    /* Party Chat */
    .party-chat {
      position: fixed;
      bottom: 52px;
      right: 16px;
      width: 300px;
      max-height: 250px;
      background: var(--bg-surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      display: flex;
      flex-direction: column;
      z-index: 190;
      box-shadow: 0 4px 20px rgba(0,0,0,0.4);
    }
    .party-chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px 12px;
      max-height: 180px;
      font-size: 12px;
    }
    .party-chat-msg {
      margin-bottom: 6px;
    }
    .party-chat-msg .sender {
      font-weight: 600;
      color: var(--accent);
      margin-right: 6px;
    }
    .party-chat-msg .text {
      color: var(--text-dim);
    }
    .party-chat-input {
      display: flex;
      border-top: 1px solid var(--border);
      padding: 8px;
      gap: 6px;
    }
    .party-chat-input input {
      flex: 1;
      background: var(--bg-deep);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 6px 10px;
      color: var(--text);
      font-size: 12px;
      font-family: var(--font-body);
      outline: none;
    }

    /* Invite toast */
    .invite-toast {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--bg-elevated);
      border: 1px solid var(--accent);
      border-radius: var(--radius);
      margin-bottom: 8px;
      font-size: 13px;
      animation: slideIn 0.3s ease;
    }
    .invite-toast .invite-text { flex: 1; color: var(--text); }
    .invite-toast .invite-actions {
      display: flex;
      gap: 6px;
    }
    .invite-toast .invite-actions .btn {
      padding: 4px 12px;
      font-size: 12px;
    }
    @keyframes slideIn {
      from { transform: translateX(100%); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <div id="game-container">
    <div id="ui-overlay"></div>
    <div id="toast-container"></div>
  </div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
