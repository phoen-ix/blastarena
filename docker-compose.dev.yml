services:
  db:
    ports:
      - "127.0.0.1:${DB_EXTERNAL_PORT:-3307}:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-dev_root_pass}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dev_pass}

  redis:
    ports:
      - "127.0.0.1:${REDIS_EXTERNAL_PORT:-6380}:6379"

  backend:
    build:
      dockerfile: docker/backend/Dockerfile.dev
    environment:
      NODE_ENV: development
      DB_PASSWORD: ${DB_PASSWORD:-dev_pass}
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      LOG_LEVEL: ${LOG_LEVEL:-debug}
    volumes:
      - ./shared:/app/shared
      - ./backend:/app/backend
      - /app/backend/node_modules
      - /app/shared/node_modules
      - ./data/gamelogs:/app/gamelogs
      - ./data/simulations:/app/simulations
      - ./data/replays:/app/replays
      - ./data/ai:/app/ai
      - ./data/enemy-ai:/app/enemy-ai
      - ./docs:/app/docs:ro
    healthcheck:
      start_period: 300s

  frontend:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      target: frontend-dev
    container_name: ${COMPOSE_PROJECT_NAME:-blast-arena}-frontend
    environment:
      APP_URL: ${APP_URL:-http://localhost:8080}
    ports:
      - "127.0.0.1:5173:5173"
    volumes:
      - ./shared:/app/shared
      - ./frontend:/app/frontend
      - /app/frontend/node_modules
      - /app/shared/node_modules
    networks:
      - internal

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
      target: nginx-dev
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
