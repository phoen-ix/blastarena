services:
  db:
    image: mariadb:11
    container_name: ${COMPOSE_PROJECT_NAME:-blast-arena}-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:?DB_ROOT_PASSWORD is required}
      MYSQL_DATABASE: ${DB_NAME:-blast_arena}
      MYSQL_USER: ${DB_USER:-blast_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
    volumes:
      - ./data/db:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - internal
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  redis:
    image: redis:7-alpine
    container_name: ${COMPOSE_PROJECT_NAME:-blast-arena}-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - ./data/redis:/data
    networks:
      - internal
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

  backend:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-blast-arena}-backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      DB_HOST: db
      DB_PORT: 3306
      DB_NAME: ${DB_NAME:-blast_arena}
      DB_USER: ${DB_USER:-blast_user}
      DB_PASSWORD: ${DB_PASSWORD:?DB_PASSWORD is required}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM_EMAIL: ${SMTP_FROM_EMAIL:-noreply@example.com}
      SMTP_FROM_NAME: ${SMTP_FROM_NAME:-BlastArena}
      APP_URL: ${APP_URL:-http://localhost:8080}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      GAME_TICK_RATE: ${GAME_TICK_RATE:-20}
      MAX_ROOMS: ${MAX_ROOMS:-50}
      MAX_PLAYERS_PER_ROOM: ${MAX_PLAYERS_PER_ROOM:-8}
      BOMB_TIMER_SECONDS: ${BOMB_TIMER_SECONDS:-3}
      POWERUP_DROP_CHANCE: ${POWERUP_DROP_CHANCE:-0.3}
      RATE_LIMIT_LOGIN: ${RATE_LIMIT_LOGIN:-5}
      RATE_LIMIT_REGISTER: ${RATE_LIMIT_REGISTER:-3}
      RATE_LIMIT_API: ${RATE_LIMIT_API:-100}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./data/gamelogs:/app/gamelogs
      - ./data/simulations:/app/simulations
      - ./data/replays:/app/replays
    networks:
      - internal
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "100m"
        max-file: "3"

  nginx:
    build:
      context: .
      dockerfile: docker/nginx/Dockerfile
    container_name: ${COMPOSE_PROJECT_NAME:-blast-arena}-nginx
    restart: unless-stopped
    ports:
      - "${APP_EXTERNAL_PORT:-8080}:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - internal
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "3"

networks:
  internal:
    driver: bridge
