# Security headers — included in every location block that uses add_header
# (Nginx does not inherit server-level add_header into location blocks that define their own)

# CSP with Trusted Types + script hash for inline theme loader
add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'sha256-QFIiZO+8gqDzr67qavMwQvoPHecoZW3SVqb8x5tzlzo='; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' ws: wss:; img-src 'self' data:; frame-ancestors 'self';" always;

# HSTS — 1 year, include subdomains
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

# Cross-Origin-Opener-Policy — isolate top-level browsing context
add_header Cross-Origin-Opener-Policy "same-origin" always;

# Prevent MIME type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Clickjacking protection (redundant with frame-ancestors in CSP, but defense-in-depth)
add_header X-Frame-Options "SAMEORIGIN" always;

# Referrer policy
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# Permissions policy — restrictive
add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
