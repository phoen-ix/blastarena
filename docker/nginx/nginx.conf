worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';

    access_log /var/log/nginx/access.log main;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 10m;

    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml application/manifest+json;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        '' close;
    }

    server {
        listen 80;
        server_name _;

        # Custom error page for backend unavailability
        error_page 502 503 504 /502.html;
        location = /502.html {
            root /usr/share/nginx/html;
            internal;
        }

        # API proxy
        location /api/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_connect_timeout 300s;
            proxy_read_timeout 300s;
        }

        # Socket.io proxy with WebSocket support
        location /socket.io/ {
            include /etc/nginx/security-headers.conf;
            proxy_pass http://backend:3000;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;
        }

        # Static assets with aggressive caching
        location /assets/ {
            include /etc/nginx/security-headers.conf;
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # Font files with aggressive caching
        location /fonts/ {
            include /etc/nginx/security-headers.conf;
            root /usr/share/nginx/html;
            expires 1y;
            add_header Cache-Control "public, immutable";
        }

        # SEO files — serve directly with caching (SPA fallback would send no-cache)
        location = /robots.txt {
            include /etc/nginx/security-headers.conf;
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=86400";
        }

        location = /sitemap.xml {
            include /etc/nginx/security-headers.conf;
            root /usr/share/nginx/html;
            add_header Content-Type "application/xml; charset=utf-8";
            add_header Cache-Control "public, max-age=86400";
        }

        location = /manifest.json {
            include /etc/nginx/security-headers.conf;
            root /usr/share/nginx/html;
            add_header Cache-Control "public, max-age=86400";
        }

        # SPA fallback (no cache for index.html so new deploys are picked up)
        location / {
            include /etc/nginx/security-headers.conf;
            root /usr/share/nginx/html;
            index index.html;
            try_files $uri $uri/ /index.html;
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }
    }
}
